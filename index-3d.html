<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paper & Ink Mahjong 🀄</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%; width: 100%;
  background: #9B7830;
  background-image:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 6px,
      rgba(70,45,15,0.12) 6px,
      rgba(70,45,15,0.12) 7px
    ),
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 23px,
      rgba(60,35,10,0.18) 23px,
      rgba(60,35,10,0.18) 25px
    ),
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 67px,
      rgba(50,30,5,0.22) 67px,
      rgba(50,30,5,0.22) 70px
    ),
    linear-gradient(
      180deg,
      #A08030 0%,
      #9B7830 15%,
      #8E6E28 35%,
      #A08535 50%,
      #937225 65%,
      #9B7830 80%,
      #8A6820 100%
    );
  background-size: auto;
  font-family: 'ZCOOL XiaoWei', 'Ma Shan Zheng', serif;
  color: #3a3028;
  overflow: hidden;
  user-select: none;
}

canvas#game-canvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 0;
}

/* Warm atmospheric vignette overlay */
body::after {
  content: '';
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, transparent 25%, rgba(45,25,5,0.55) 100%);
  pointer-events: none;
  z-index: 5;
}

/* ========== UI OVERLAY ========== */
#ui-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; z-index: 10;
}
#ui-overlay > * { pointer-events: auto; }

/* ========== TOP BAR ========== */
.top-bar {
  display: flex; justify-content: center; align-items: center;
  padding: 10px 16px;
  position: relative;
}
.header-center {
  text-align: center;
}
.header-title {
  font-size: 30px;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  color: #2a2018;
  letter-spacing: 4px;
  font-weight: 800;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
}
.header-subtitle {
  font-size: 14px;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  color: #7a6a5a;
  letter-spacing: 1px;
  margin-top: 2px;
  font-weight: 500;
}
.top-btns {
  display: flex; gap: 8px;
  position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
}
.menu-btn {
  width: auto; height: auto; border-radius: 8px;
  background: linear-gradient(135deg, #8b6914, #7a5a10);
  border: 1px solid rgba(160,140,110,0.3);
  color: #fffff8; font-size: 16px; cursor: pointer;
  padding: 8px 16px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 3px 10px rgba(80,60,30,0.2);
  backdrop-filter: blur(10px);
  transition: all 0.2s;
  font-family: 'Ma Shan Zheng', serif;
}
.menu-btn:hover { background: linear-gradient(135deg, #a07a1a, #8b6914); }
.menu-btn:active { transform: scale(0.95); }

/* ========== TOOLBAR BUTTONS (bottom-right & top-right icon squares) ========== */
.toolbar-group {
  position: fixed;
  bottom: 28px;
  right: 28px;
  display: flex;
  gap: 8px;
  z-index: 40;
}
.toolbar-btn {
  width: 68px;
  height: 68px;
  border-radius: 10px;
  background: linear-gradient(180deg, #f5ede0, #ece2cf);
  border: 2px solid #c0a878;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 3px 10px rgba(80,60,30,0.22);
  font-family: 'Helvetica Neue', sans-serif;
  transition: all 0.2s;
  padding: 0;
}
.toolbar-btn:hover {
  filter: brightness(1.05);
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(80,60,30,0.28);
}
.toolbar-btn .tb-icon {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.toolbar-btn .tb-icon svg {
  width: 28px;
  height: 28px;
}
.toolbar-btn .tb-label {
  font-size: 10px;
  letter-spacing: 0.8px;
  color: #5a4a38;
  font-weight: 600;
  text-transform: uppercase;
  margin-top: 2px;
  line-height: 1;
}

/* ========== PLAYER BUBBLES ========== */
.player-bubble {
  position: absolute;
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 30;
}
.bubble-avatar {
  width: 150px; height: 150px; border-radius: 50%;
  border: 2.5px solid rgba(180,160,130,0.5);
  display: flex; align-items: center; justify-content: center;
  font-size: 0;
  box-shadow: 0 4px 16px rgba(80,60,30,0.18);
  transition: all 0.3s;
  flex-shrink: 0;
  background: rgba(245,240,232,0.9);
  background-size: cover;
  background-position: center;
  overflow: hidden;
}
/* Player avatar portraits */
.avatar-lin {
  background-image: url("assets/avatar-lin.png");
}
.avatar-chen {
  background-image: url("assets/avatar-chen.png");
}
.avatar-kenji {
  background-image: url("assets/avatar-kenji.png");
}
.avatar-keni {
  background-image: url("assets/avatar-keni.png");
}
.bubble-info {
  background: rgba(245,240,232,0.95);
  border-radius: 14px;
  padding: 8px 16px;
  box-shadow: 0 2px 8px rgba(80,60,30,0.08);
  line-height: 1.3;
  white-space: nowrap;
  border: 1px solid rgba(160,140,110,0.2);
}
.player-number {
  font-size: 10px; color: #8a7a6a; text-transform: uppercase;
  letter-spacing: 1px; font-family: sans-serif; margin-bottom: 1px;
}
.bubble-info .name {
  font-size: 16px; color: #4a3a28;
  font-family: 'Ma Shan Zheng', serif;
}
.bubble-info .score { font-size: 13px; color: #8a7a6a; }
.bubble-info .wind-seat {
  font-size: 13px; color: #b33a2a;
  display: inline-block; margin-left: 4px;
  font-family: 'Ma Shan Zheng', serif;
}
.player-bubble.active .bubble-avatar {
  border-color: #b33a2a;
  box-shadow: 0 3px 12px rgba(179,58,42,0.3), 0 0 0 4px rgba(179,58,42,0.15);
  animation: pulse 1.8s ease infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 3px 12px rgba(179,58,42,0.3), 0 0 0 4px rgba(179,58,42,0.15); }
  50% { box-shadow: 0 3px 12px rgba(179,58,42,0.3), 0 0 0 8px rgba(179,58,42,0.08); }
}

#p-north { top: 24px; left: 50%; transform: translateX(-50%); flex-direction: column; align-items: center; gap: 2px; }
#p-west { top: 45%; left: 28px; transform: translateY(-50%); }
#p-east { top: 45%; right: 28px; transform: translateY(-50%); flex-direction: row-reverse; }
#p-south { bottom: 150px; right: 40px; }

/* ========== PLAYER HAND (2D overlay at bottom) ========== */
.hand-tray {
  position: fixed;
  bottom: 62px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(245,240,232,0.85);
  backdrop-filter: blur(16px);
  border-radius: 16px;
  padding: 12px 18px;
  display: flex;
  justify-content: center;
  gap: 4px;
  box-shadow: 0 -2px 20px rgba(80,60,30,0.1), inset 0 1px 0 rgba(255,255,255,0.5);
  border: 1px solid rgba(180,160,130,0.3);
  z-index: 25;
  max-width: 96%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.hand-tray::-webkit-scrollbar { height: 4px; }
.hand-tray::-webkit-scrollbar-thumb { background: rgba(160,140,110,0.3); border-radius: 2px; }

/* Tile in hand */
.tile {
  width: 92px; height: 120px; position: relative;
  cursor: pointer;
  transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
  transform-origin: bottom center;
  flex-shrink: 0;
}
.tile-body {
  width: 100%; height: 100%;
  border-radius: 14px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  background: linear-gradient(180deg, #fefefe 0%, #fafaf5 40%, #f2ece0 100%);
  border: 1.5px solid #c8b898;
  box-shadow:
    2px 2px 0 #c0a880,
    2px 2px 0 1px rgba(180,155,110,0.3),
    inset 0 1px 0 rgba(255,255,255,0.95),
    inset 0 -1px 2px rgba(160,140,110,0.08);
}
.tile .face {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 100%;
  padding: 4px;
  font-size: 52px;
  line-height: 1;
  border-radius: 12px;
}
.tile .face .char-top {
  font-size: 38px;
  font-family: 'Ma Shan Zheng', serif;
  color: #2a2018;
  line-height: 1;
}
.tile .face .char-bottom {
  font-size: 32px;
  font-family: 'Ma Shan Zheng', serif;
  color: #b33a2a;
  line-height: 1;
}
.tile .face .tile-content {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 0;
  width: 100%; height: 100%;
}

.tile:hover {
  transform: translateY(-8px);
}
.tile:hover .tile-body {
  box-shadow:
    0 4px 12px rgba(200,170,80,0.25),
    0 6px 16px rgba(80,60,30,0.1),
    inset 0 1px 0 rgba(255,255,255,0.8);
  border-color: rgba(200,170,80,0.5);
}
.tile.selected { transform: translateY(-18px) scale(1.05); }
.tile.selected .tile-body {
  border-color: #c8a040;
  box-shadow:
    0 8px 24px rgba(200,160,64,0.3),
    0 0 0 2px rgba(200,160,64,0.4),
    0 0 20px rgba(200,170,80,0.15);
}
.tile.drawn { margin-left: 18px !important; }
.tile.drawn::after {
  content: ''; position: absolute; top: -3px; left: -3px; right: -3px; bottom: -3px;
  border: 2px dashed rgba(200,160,64,0.4);
  border-radius: 8px;
  pointer-events: none;
  animation: drawnPulse 2s ease infinite;
}
@keyframes drawnPulse {
  0%, 100% { border-color: rgba(200,160,64,0.4); }
  50% { border-color: rgba(200,160,64,0.15); }
}

/* ========== PLAYER LABEL ========== */
.player-label {
  position: fixed;
  bottom: 136px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 26;
}
.player-label .avatar {
  width: 60px; height: 60px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0;
  background: rgba(245,240,232,0.9);
  background-size: cover;
  background-position: center;
  overflow: hidden;
  border: 1px solid rgba(180,160,130,0.4);
  box-shadow: 0 2px 8px rgba(80,60,30,0.1);
}
.player-label .info {
  background: rgba(245,240,232,0.92);
  border-radius: 10px;
  padding: 4px 12px;
  border: 1px solid rgba(160,140,110,0.2);
}
.player-label .name {
  font-size: 13px; color: #4a3a28;
  font-family: 'Ma Shan Zheng', serif;
}
.player-label .score { font-size: 11px; color: #8a7a6a; margin-left: 6px; }

/* ========== ACTION BUTTONS ========== */
.action-bar {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: row;
  gap: 8px;
  z-index: 40;
}
.action-btn {
  border: none;
  border-radius: 12px;
  padding: 12px 26px;
  font-size: 16px;
  font-family: 'Ma Shan Zheng', serif;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 14px rgba(80,60,30,0.25);
  display: none;
  min-width: 80px;
  text-align: center;
  letter-spacing: 1px;
}
.action-btn.visible { display: block; }
.action-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
.action-btn:active { transform: scale(0.95); }

.action-btn.chi { background: linear-gradient(135deg, #6a9a5a, #5a8a4a); color: #fffff8; box-shadow: 0 4px 14px rgba(90,138,74,0.3); }
.action-btn.pong { background: linear-gradient(135deg, #8b6914, #7a5a10); color: #fffff8; box-shadow: 0 4px 14px rgba(139,105,20,0.3); }
.action-btn.kong { background: linear-gradient(135deg, #6a5a4a, #5a4a3a); color: #fffff8; box-shadow: 0 4px 14px rgba(90,74,58,0.3); }
.action-btn.mahjong { background: linear-gradient(135deg, #c0392b, #a93226); color: #fffff8; box-shadow: 0 4px 18px rgba(192,57,43,0.4); }
.action-btn.skip { background: linear-gradient(135deg, #b0a898, #9a9080); color: #fffff8; }
.action-btn.discard { background: linear-gradient(135deg, #c0392b, #a93226); color: #fffff8; box-shadow: 0 4px 18px rgba(192,57,43,0.4); }
.action-btn.sort { background: linear-gradient(135deg, #8b6914, #7a5a10); color: #fffff8; border: none; }

/* ========== CLAIM PANEL ========== */
.claim-panel {
  position: fixed;
  bottom: 140px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(245,240,232,0.97);
  backdrop-filter: blur(16px);
  border-radius: 16px;
  padding: 16px 20px;
  box-shadow: 0 8px 32px rgba(80,60,30,0.15);
  border: 1px solid rgba(160,140,110,0.3);
  display: none;
  flex-direction: column;
  gap: 8px;
  z-index: 50;
  max-width: 90%;
}
.claim-panel.visible { display: flex; }
.claim-panel-title {
  font-size: 15px; color: #5a4a3a;
  text-align: center; margin-bottom: 4px;
  font-family: 'Ma Shan Zheng', serif;
}
.claim-option {
  display: flex; align-items: center; gap: 10px;
  background: rgba(230,222,210,0.6);
  border-radius: 12px;
  padding: 8px 14px;
  cursor: pointer;
  transition: all 0.2s;
  border: 2px solid transparent;
}
.claim-option:hover {
  background: rgba(220,210,195,0.8);
  border-color: #b33a2a;
}
.claim-option .tiles-preview { display: flex; gap: 3px; }
.claim-option .preview-tile {
  width: 28px; height: 38px;
  border-radius: 4px;
  background: linear-gradient(160deg, #fffff8 0%, #f8f4ec 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  border: 1px solid rgba(160,140,110,0.3);
  box-shadow: 0 1px 3px rgba(80,60,30,0.1);
}
.claim-option .preview-tile.claimed {
  border-color: #b33a2a;
  box-shadow: 0 0 0 1px #b33a2a;
}
.claim-option .action-label {
  font-size: 14px; color: #5a4a3a;
  font-family: 'Ma Shan Zheng', serif;
}

/* ========== TURN INDICATOR ========== */
.turn-indicator {
  position: fixed;
  bottom: 138px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 16px;
  font-family: 'Ma Shan Zheng', serif;
  color: #fffff8;
  background: #5a4a3a;
  border-radius: 20px;
  padding: 10px 24px;
  box-shadow: 0 3px 10px rgba(80,60,30,0.2);
  white-space: nowrap;
  z-index: 35;
  transition: all 0.4s;
}
.turn-indicator.your-turn {
  background: linear-gradient(135deg, #c0392b, #a93226);
  box-shadow: 0 0 18px rgba(192,57,43,0.45), 0 4px 12px rgba(80,60,30,0.2);
  animation: turnPulse 2s ease infinite;
}
@keyframes turnPulse { 0%,100% { transform: translateX(-50%) scale(1); box-shadow: 0 0 18px rgba(192,57,43,0.45); } 50% { transform: translateX(-50%) scale(1.05); box-shadow: 0 0 28px rgba(192,57,43,0.6); } }

/* ========== TOAST ========== */
.toast {
  position: fixed; top: 38%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
  background: rgba(245,240,232,0.97);
  backdrop-filter: blur(16px);
  border-radius: 16px;
  padding: 16px 32px;
  font-size: 22px; color: #4a3a28;
  font-family: 'Ma Shan Zheng', serif;
  opacity: 0;
  transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none;
  z-index: 100;
  box-shadow: 0 8px 32px rgba(80,60,30,0.2);
  border: 1px solid rgba(160,140,110,0.3);
  text-align: center;
}
.toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

.ai-toast {
  position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%) scale(0);
  background: rgba(245,240,232,0.95);
  backdrop-filter: blur(16px);
  border-radius: 14px;
  padding: 12px 24px;
  font-size: 17px; color: #5a4a3a;
  font-family: 'Ma Shan Zheng', serif;
  opacity: 0;
  transition: all 0.4s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none;
  z-index: 99;
  box-shadow: 0 8px 24px rgba(80,60,30,0.12);
  border: 1px solid rgba(160,140,110,0.2);
  white-space: nowrap;
}
.ai-toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

/* ========== DISCARD OVERLAY ========== */
.discard-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(40,32,24,0.7);
  backdrop-filter: blur(6px);
  display: none;
  align-items: center; justify-content: center;
  z-index: 150;
}
.discard-overlay.show { display: flex; }
.discard-modal {
  background: rgba(248,244,236,0.98);
  border-radius: 20px;
  padding: 24px;
  max-width: 90vw;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 16px 48px rgba(40,30,20,0.3);
  border: 1px solid rgba(160,140,110,0.3);
  min-width: 320px;
}
.discard-modal h3 {
  font-family: 'Ma Shan Zheng', serif;
  font-size: 22px; color: #4a3a28;
  text-align: center; margin-bottom: 16px;
  font-weight: 400;
}
.discard-section {
  margin-bottom: 12px;
}
.discard-section-title {
  font-family: 'Ma Shan Zheng', serif;
  font-size: 16px; color: #8a7a6a;
  margin-bottom: 6px;
  padding-left: 4px;
}
.discard-grid {
  display: flex; flex-wrap: wrap; gap: 4px;
}
.discard-grid .dtile {
  width: 36px; height: 48px;
  border-radius: 4px;
  background: linear-gradient(160deg, #fffff8 0%, #f8f4ec 100%);
  border: 1px solid rgba(160,140,110,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: 0 1px 3px rgba(80,60,30,0.1);
}
.discard-close-bar {
  display: flex; gap: 8px; justify-content: center; margin-top: 16px;
}
.discard-close-bar button {
  font-family: 'Ma Shan Zheng', serif;
  font-size: 15px;
  padding: 8px 22px;
  border-radius: 14px;
  border: 1px solid rgba(160,140,110,0.3);
  cursor: pointer;
  transition: all 0.2s;
}
.discard-close-bar .close-btn {
  background: #5a4a3a; color: #fffff8; border: none;
}
.discard-close-bar .sort-btn {
  background: rgba(245,240,232,0.95); color: #5a4a3a;
}

/* ========== MELDS ========== */
.melds-area {
  position: fixed; display: flex; gap: 6px; flex-wrap: wrap; z-index: 12;
}
.melds-area.bottom { bottom: 142px; left: 16px; max-width: 45%; }
.melds-area.top { top: 70px; right: 16px; max-width: 40%; flex-direction: row-reverse; }
.melds-area.left { left: 70px; top: calc(45% + 60px); flex-direction: column; }
.melds-area.right { right: 70px; top: calc(45% + 60px); flex-direction: column; }

.meld-group {
  display: flex; gap: 2px;
  background: rgba(245,240,232,0.7);
  border-radius: 6px;
  padding: 3px;
  border: 1px solid rgba(160,140,110,0.2);
}
.meld-group.concealed { background: rgba(200,190,175,0.3); }
.meld-tile {
  width: 22px; height: 30px;
  border-radius: 4px;
  background: linear-gradient(160deg, #fffff8 0%, #f8f4ec 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  border: 1px solid rgba(160,140,110,0.25);
  box-shadow: 0 1px 2px rgba(80,60,30,0.06);
}
.meld-tile.facedown {
  background: linear-gradient(160deg, #d8d0c4 0%, #c8c0b4 100%);
}

/* ========== WALL INFO (center table) ========== */
.wall-info {
  display: none;
}
.wall-info .dealer {
  font-size: 22px; color: #b33a2a;
  font-family: 'Ma Shan Zheng', serif;
}
.wall-info .tiles-left { font-size: 10px; color: #8a7a6a; }

/* ========== MODAL ========== */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(40,32,24,0.5);
  backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center;
  z-index: 200;
}
.modal-overlay.show { display: flex; }

<script>
// ============================================================
// PAPER & INK MAHJONG — Three.js 3D + HK Rules
// ============================================================

// ==================== TILE UNICODE MAP ====================
const TILE_UNICODE = {
  'bamboo-1': '🀐', 'bamboo-2': '🀑', 'bamboo-3': '🀒', 'bamboo-4': '🀓',
  'bamboo-5': '🀔', 'bamboo-6': '🀕', 'bamboo-7': '🀖', 'bamboo-8': '🀗', 'bamboo-9': '🀘',
  'dots-1': '🀙', 'dots-2': '🀚', 'dots-3': '🀛', 'dots-4': '🀜',
  'dots-5': '🀝', 'dots-6': '🀞', 'dots-7': '🀟', 'dots-8': '🀠', 'dots-9': '🀡',
  'characters-1': '🀇', 'characters-2': '🀈', 'characters-3': '🀉', 'characters-4': '🀊',
  'characters-5': '🀋', 'characters-6': '🀌', 'characters-7': '🀍', 'characters-8': '🀎', 'characters-9': '🀏',
  'winds-East': '🀀', 'winds-South': '🀁', 'winds-West': '🀂', 'winds-North': '🀃',
  'dragons-Red': '🀄', 'dragons-Green': '🀅', 'dragons-White': '🀆',
};

// Ink-style text labels for tiles (used on canvas textures)
const TILE_LABELS = {};
for (let i = 1; i <= 9; i++) {
  TILE_LABELS[`bamboo-${i}`] = { top: ['一','二','三','四','五','六','七','八','九'][i-1], bottom: '竹', color: '#2a5a3a' };
  TILE_LABELS[`dots-${i}`] = { top: ['一','二','三','四','五','六','七','八','九'][i-1], bottom: '筒', color: '#2a3a6a' };
  TILE_LABELS[`characters-${i}`] = { top: ['一','二','三','四','五','六','七','八','九'][i-1], bottom: '萬', color: '#6a2a2a' };
}
TILE_LABELS['winds-East'] = { top: '東', bottom: '', color: '#2a2a2a' };
TILE_LABELS['winds-South'] = { top: '南', bottom: '', color: '#2a2a2a' };
TILE_LABELS['winds-West'] = { top: '西', bottom: '', color: '#2a2a2a' };
TILE_LABELS['winds-North'] = { top: '北', bottom: '', color: '#2a2a2a' };
TILE_LABELS['dragons-Red'] = { top: '中', bottom: '', color: '#b33a2a' };
TILE_LABELS['dragons-Green'] = { top: '發', bottom: '', color: '#2a6a3a' };
TILE_LABELS['dragons-White'] = { top: '白', bottom: '', color: '#6a6a7a' };

function getTileKey(tile) {
  if (tile.num !== undefined) return `${tile.suit}-${tile.num}`;
  if (tile.wind) return `winds-${tile.wind}`;
  if (tile.dragon) return `dragons-${tile.dragon}`;
  if (tile.flower) return `flower-${tile.flower}`;
  if (tile.season) return `season-${tile.season}`;
  return 'unknown';
}

function getTileDisplay(tile) {
  const key = getTileKey(tile);
  return TILE_UNICODE[key] || '🀫';
}

function getTileLabel(tile) {
  const key = getTileKey(tile);
  if (TILE_LABELS[key]) return TILE_LABELS[key];
  if (tile.flower) return { top: ['梅','蘭','菊','竹'][['Plum','Orchid','Chrysanthemum','Bamboo'].indexOf(tile.flower)] || '花', bottom: '', color: '#8a3a5a' };
  if (tile.season) return { top: ['春','夏','秋','冬'][['Spring','Summer','Autumn','Winter'].indexOf(tile.season)] || '季', bottom: '', color: '#5a6a3a' };
  return { top: '?', bottom: '', color: '#888' };
}

// ==================== GAME STATE CLASS ====================
const WINDS = ['East', 'South', 'West', 'North'];
const WIND_CHARS = { East: '東', South: '南', West: '西', North: '北' };
const DRAGONS = ['Red', 'Green', 'White'];
const FLOWERS = ['Plum', 'Orchid', 'Chrysanthemum', 'Bamboo'];
const SEASONS = ['Spring', 'Summer', 'Autumn', 'Winter'];
const PLAYER_NAMES = { 0: 'Lin', 1: 'Chen', 2: 'Kenji', 3: 'Keni' };
const PLAYER_EMOJIS = { 0: '林', 1: '陳', 2: '健', 3: '雪' };
const SEAT_MAP = { 0: 'east', 1: 'south', 2: 'west', 3: 'north' };

class GameState {
  constructor() {
    this.reset();
  }

  reset() {
    this.wall = [];
    this.deadWall = [];
    this.players = [
      { seat: 'east', hand: [], melds: [], flowers: [], discards: [], score: 25000, isAI: true },
      { seat: 'south', hand: [], melds: [], flowers: [], discards: [], score: 25000, isAI: false },
      { seat: 'west', hand: [], melds: [], flowers: [], discards: [], score: 25000, isAI: true },
      { seat: 'north', hand: [], melds: [], flowers: [], discards: [], score: 25000, isAI: true }
    ];
    this.currentPlayer = 0;
    this.dealerSeat = 0;
    this.roundWind = 'East';
    this.lastDiscard = null;
    this.lastDiscardPlayer = -1;
    this.drawnTile = null;
    this.phase = 'waiting'; // waiting, discard, claiming, ended
    this.claimWindow = false;
    this.possibleClaims = [];
    this.selectedTileIndex = -1;
    this.claimTimeoutId = null;
    this.justClaimed = false;
    this.kongInProgress = false;
    this.pendingKongTile = null;
    this.winType = null;
  }

  createTileSet() {
    const tiles = [];
    let id = 0;
    for (const suit of ['bamboo', 'dots', 'characters']) {
      for (let num = 1; num <= 9; num++) {
        for (let i = 0; i < 4; i++) {
          tiles.push({ id: id++, suit, num, type: 'suited' });
        }
      }
    }
    for (const wind of WINDS) {
      for (let i = 0; i < 4; i++) {
        tiles.push({ id: id++, suit: 'winds', wind, type: 'honor' });
      }
    }
    for (const dragon of DRAGONS) {
      for (let i = 0; i < 4; i++) {
        tiles.push({ id: id++, suit: 'dragons', dragon, type: 'honor' });
      }
    }
    for (const flower of FLOWERS) {
      tiles.push({ id: id++, suit: 'flowers', flower, type: 'bonus' });
    }
    for (const season of SEASONS) {
      tiles.push({ id: id++, suit: 'flowers', season, type: 'bonus' });
    }
    return tiles;
  }

  shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  getTileSortKey(tile) {
    const suitOrder = { bamboo: 0, dots: 1, characters: 2, winds: 3, dragons: 4, flowers: 5 };
    let key = (suitOrder[tile.suit] || 0) * 100;
    if (tile.num) key += tile.num;
    if (tile.wind) key += WINDS.indexOf(tile.wind);
    if (tile.dragon) key += DRAGONS.indexOf(tile.dragon);
    if (tile.flower) key += FLOWERS.indexOf(tile.flower);
    if (tile.season) key += SEASONS.indexOf(tile.season) + 4;
    return key;
  }

  sortHand(hand) {
    return hand.sort((a, b) => this.getTileSortKey(a) - this.getTileSortKey(b));
  }

  tilesMatch(a, b) {
    if (a.suit !== b.suit) return false;
    if (a.num !== undefined) return a.num === b.num;
    if (a.wind) return a.wind === b.wind;
    if (a.dragon) return a.dragon === b.dragon;
    return false;
  }

  countMatching(hand, tile) {
    return hand.filter(t => this.tilesMatch(t, tile)).length;
  }

  dealTiles() {
    const allTiles = this.shuffle(this.createTileSet());
    this.deadWall = allTiles.splice(-14);
    this.wall = allTiles;

    for (let round = 0; round < 3; round++) {
      for (let p = 0; p < 4; p++) {
        for (let i = 0; i < 4; i++) this.drawTileToHand(p);
      }
    }
    for (let p = 0; p < 4; p++) this.drawTileToHand(p);
    this.drawTileToHand(this.dealerSeat);

    for (const p of this.players) this.sortHand(p.hand);
    for (let p = 0; p < 4; p++) this.handleFlowers(p);
  }

  drawTileToHand(pi) {
    if (this.wall.length === 0) return null;
    const tile = this.wall.shift();
    this.players[pi].hand.push(tile);
    return tile;
  }

  drawReplacementTile(pi) {
    let tile;
    if (this.deadWall.length > 0) tile = this.deadWall.shift();
    else if (this.wall.length > 0) tile = this.wall.pop();
    else return null;
    this.players[pi].hand.push(tile);
    return tile;
  }

  handleFlowers(pi) {
    const player = this.players[pi];
    let hadFlowers = false;
    while (true) {
      const fi = player.hand.findIndex(t => t.type === 'bonus');
      if (fi === -1) break;
      const flower = player.hand.splice(fi, 1)[0];
      player.flowers.push(flower);
      hadFlowers = true;
      if (!this.drawReplacementTile(pi)) break;
    }
    if (hadFlowers) this.sortHand(player.hand);
    return hadFlowers;
  }

  // ========== Winning logic ==========
  canMahjong(pi, tile = null) {
    const player = this.players[pi];
    const hand = [...player.hand];
    if (tile) hand.push(tile);
    const setsNeeded = 4 - player.melds.length;
    return this.checkWinningHand(hand, setsNeeded);
  }

  checkWinningHand(hand, setsNeeded = 4) {
    const expected = setsNeeded * 3 + 2;
    if (hand.length !== expected) return false;
    const sorted = [...hand].sort((a, b) => this.getTileSortKey(a) - this.getTileSortKey(b));
    for (let i = 0; i < sorted.length - 1; i++) {
      if (this.tilesMatch(sorted[i], sorted[i + 1])) {
        if (i > 0 && this.tilesMatch(sorted[i], sorted[i - 1])) continue;
        const remaining = [...sorted];
        remaining.splice(i, 2);
        if (this.canFormSets(remaining, setsNeeded)) return true;
      }
    }
    return false;
  }

  canFormSets(tiles, numSets) {
    if (tiles.length === 0) return numSets === 0;
    if (tiles.length !== numSets * 3) return false;
    const sorted = [...tiles].sort((a, b) => this.getTileSortKey(a) - this.getTileSortKey(b));

    // Try pung
    if (sorted.length >= 3 && this.tilesMatch(sorted[0], sorted[1]) && this.tilesMatch(sorted[1], sorted[2])) {
      if (this.canFormSets(sorted.slice(3), numSets - 1)) return true;
    }
    // Try chi
    if (sorted[0].type === 'suited' && sorted.length >= 3) {
      const t1 = sorted[0];
      const t2i = sorted.findIndex((t, i) => i > 0 && t.suit === t1.suit && t.num === t1.num + 1);
      const t3i = sorted.findIndex((t, i) => i > 0 && t.suit === t1.suit && t.num === t1.num + 2);
      if (t2i > 0 && t3i > 0) {
        const remaining = [...sorted];
        for (const idx of [0, t2i, t3i].sort((a, b) => b - a)) remaining.splice(idx, 1);
        if (this.canFormSets(remaining, numSets - 1)) return true;
      }
    }
    return false;
  }

  // ========== Claiming ==========
  getChiCombinations(pi, tile) {
    if (tile.type !== 'suited') return [];
    const leftPlayer = (pi + 3) % 4;
    if (this.lastDiscardPlayer !== leftPlayer) return [];
    const hand = this.players[pi].hand;
    const suit = tile.suit, num = tile.num;
    const combos = [];
    const hasN = (n) => hand.some(t => t.suit === suit && t.num === n);
    const findT = (n) => hand.find(t => t.suit === suit && t.num === n);

    if (num >= 3 && hasN(num - 2) && hasN(num - 1))
      combos.push({ type: 'chi', tiles: [findT(num - 2), findT(num - 1), tile] });
    if (num >= 2 && num <= 8 && hasN(num - 1) && hasN(num + 1))
      combos.push({ type: 'chi', tiles: [findT(num - 1), tile, findT(num + 1)] });
    if (num <= 7 && hasN(num + 1) && hasN(num + 2))
      combos.push({ type: 'chi', tiles: [tile, findT(num + 1), findT(num + 2)] });
    return combos;
  }

  canChi(pi, tile) { return this.getChiCombinations(pi, tile).length > 0; }

  canPong(pi, tile) {
    if (this.lastDiscardPlayer === pi) return false;
    return this.countMatching(this.players[pi].hand, tile) >= 2;
  }

  canKong(pi, tile) {
    if (this.lastDiscardPlayer === pi) return false;
    return this.countMatching(this.players[pi].hand, tile) >= 3;
  }

  getConcealedKongs(pi) {
    const hand = this.players[pi].hand;
    const counts = {};
    const kongs = [];
    for (const tile of hand) {
      const key = getTileKey(tile);
      counts[key] = (counts[key] || 0) + 1;
      if (counts[key] === 4) kongs.push({ tile, key });
    }
    return kongs;
  }

  getAddKongs(pi) {
    const player = this.players[pi];
    const addKongs = [];
    for (const meld of player.melds) {
      if (meld.type === 'pong') {
        const match = player.hand.find(t => this.tilesMatch(t, meld.tiles[0]));
        if (match) addKongs.push({ meld, tile: match });
      }
    }
    return addKongs;
  }

  // ========== AI ==========
  evaluateTileValue(hand, tile) {
    const matchCount = this.countMatching(hand, tile);
    let value = 0;
    if (matchCount >= 3) value += 50;
    else if (matchCount >= 2) value += 30;
    else if (matchCount === 1) value += 5;

    if (tile.type === 'suited') {
      const { num, suit } = tile;
      const hasN = (n) => n >= 1 && n <= 9 && hand.some(t => t.suit === suit && t.num === n);
      if (hasN(num - 1)) value += 15;
      if (hasN(num + 1)) value += 15;
      if (hasN(num - 2)) value += 8;
      if (hasN(num + 2)) value += 8;
      if (num >= 4 && num <= 6) value += 5;
      if (num === 1 || num === 9) value -= 3;
    }
    if (tile.type === 'honor' && matchCount === 1) value -= 5;
    return value;
  }

  aiChooseDiscard(pi) {
    const hand = this.players[pi].hand;
    if (hand.length === 0) return -1;
    const evals = hand.map((tile, index) => ({ index, value: this.evaluateTileValue(hand, tile) }));
    evals.sort((a, b) => a.value - b.value);
    const cands = evals.slice(0, Math.min(3, evals.length));
    return cands[Math.floor(Math.random() * cands.length)].index;
  }
}

// ==================== THREE.JS RENDERER ====================
class Renderer {
  constructor() {
    this.scene = new THREE.Scene();
    this.camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    this.renderer = new THREE.WebGLRenderer({
      canvas: document.getElementById('game-canvas'),
      antialias: true,
      alpha: false
    });
    this.renderer.setSize(window.innerWidth, window.innerHeight);
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    this.renderer.shadowMap.enabled = true;
    this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
    this.renderer.toneMappingExposure = 1.45;

    // Camera setup - close isometric view for table to fill viewport
    this.camera.position.set(0, 9, 8);
    this.camera.lookAt(0, 0, -1);

    this.tileTextures = {};
    this.tileMeshes = [];
    this.discardMeshes = [];
    this.wallMeshes = [];
    this.animating = false;

    this.setupScene();
    this.createBodyBackground();
    this.animate();

    window.addEventListener('resize', () => this.onResize());
  }

  setupScene() {
    // Background - warm aged parchment with ink wash sky
    this.createBackgroundSky();
    this.scene.fog = new THREE.Fog(0xc4a87a, 22, 45);

    // Ambient light — lower for toon shading contrast
    const ambient = new THREE.AmbientLight(0xfff5e0, 0.3);
    this.scene.add(ambient);

    // Hemisphere light for natural sky/ground bounce
    const hemiLight = new THREE.HemisphereLight(0xfff0d8, 0xe8d8c0, 0.25);
    this.scene.add(hemiLight);

    // Main directional light — warm, from above-front
    const dirLight = new THREE.DirectionalLight(0xfff0d0, 1.5);
    dirLight.position.set(2, 9, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 25;
    dirLight.shadow.camera.left = -7;
    dirLight.shadow.camera.right = 7;
    dirLight.shadow.camera.top = 7;
    dirLight.shadow.camera.bottom = -7;
    dirLight.shadow.bias = -0.001;
    dirLight.shadow.normalBias = 0.02;
    dirLight.shadow.radius = 1;
    this.scene.add(dirLight);

    // Warm fill light from opposite side
    const fillLight = new THREE.DirectionalLight(0xfce4c8, 0.25);
    fillLight.position.set(-4, 6, -3);
    this.scene.add(fillLight);

    // Subtle warm rim light from behind
    const rimLight = new THREE.DirectionalLight(0xffd8a8, 0.15);
    rimLight.position.set(0, 3, -6);
    this.scene.add(rimLight);

    // Table surface
    this.createTable();

    // Ink wash decorations on table
    this.createInkDecorations();

    // Wind direction indicator tiles in center
    this.createWindIndicators();
  }

  createBackgroundSky() {
    // Warm wood panel background texture
    const canvas = document.createElement('canvas');
    canvas.width = 1024;
    canvas.height = 1024;
    const ctx = canvas.getContext('2d');

    // Rich honey-amber wood base gradient
    const bgGrad = ctx.createLinearGradient(0, 0, 0, 1024);
    bgGrad.addColorStop(0, '#c4a87a');
    bgGrad.addColorStop(0.25, '#c8b08a');
    bgGrad.addColorStop(0.5, '#c4a87a');
    bgGrad.addColorStop(0.75, '#b89a6e');
    bgGrad.addColorStop(1, '#c4a87a');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, 1024, 1024);

    // Horizontal wood grain lines — many fine strokes
    for (let i = 0; i < 300; i++) {
      const y = Math.random() * 1024;
      const width = 200 + Math.random() * 824;
      const x = Math.random() * (1024 - width);
      const lightOrDark = Math.random() > 0.5;
      const alpha = 0.03 + Math.random() * 0.06;
      if (lightOrDark) {
        ctx.strokeStyle = `rgba(210,195,170,${alpha})`;
      } else {
        ctx.strokeStyle = `rgba(160,140,110,${alpha})`;
      }
      ctx.lineWidth = 0.5 + Math.random() * 1.5;
      ctx.beginPath();
      ctx.moveTo(x, y);
      // Slight waviness for natural grain
      const midX = x + width / 2;
      const drift = (Math.random() - 0.5) * 4;
      ctx.quadraticCurveTo(midX, y + drift, x + width, y + (Math.random() - 0.5) * 2);
      ctx.stroke();
    }

    // Broader grain bands for depth
    for (let i = 0; i < 40; i++) {
      const y = Math.random() * 1024;
      const alpha = 0.02 + Math.random() * 0.04;
      const dark = Math.random() > 0.4;
      ctx.fillStyle = dark
        ? `rgba(150,130,105,${alpha})`
        : `rgba(210,195,170,${alpha})`;
      ctx.fillRect(0, y, 1024, 2 + Math.random() * 6);
    }

    // Subtle knot-like darker patches
    for (let i = 0; i < 5; i++) {
      const kx = Math.random() * 1024;
      const ky = Math.random() * 1024;
      const kr = 20 + Math.random() * 40;
      const knotGrad = ctx.createRadialGradient(kx, ky, 0, kx, ky, kr);
      knotGrad.addColorStop(0, 'rgba(140,120,95,0.08)');
      knotGrad.addColorStop(0.6, 'rgba(140,120,95,0.03)');
      knotGrad.addColorStop(1, 'rgba(140,120,95,0)');
      ctx.fillStyle = knotGrad;
      ctx.fillRect(kx - kr, ky - kr, kr * 2, kr * 2);
    }

    // Fine noise for texture
    for (let i = 0; i < 6000; i++) {
      const x = Math.random() * 1024;
      const y = Math.random() * 1024;
      const alpha = Math.random() * 0.025;
      ctx.fillStyle = `rgba(130,110,85,${alpha})`;
      ctx.fillRect(x, y, Math.random() * 2 + 0.5, Math.random() * 2 + 0.5);
    }

    // Warm center glow — like overhead lamp reflection on polished wood
    const glow = ctx.createRadialGradient(512, 450, 50, 512, 450, 500);
    glow.addColorStop(0, 'rgba(200,170,120,0.1)');
    glow.addColorStop(1, 'rgba(200,170,120,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, 1024, 1024);

    // Faint ink-wash mountain silhouettes
    const mtLayers = [
      { yBase: 730, opacity: 0.05, color: '120,105,85' },
      { yBase: 790, opacity: 0.04, color: '110,95,75' },
      { yBase: 840, opacity: 0.03, color: '130,115,95' }
    ];
    for (const layer of mtLayers) {
      ctx.beginPath();
      ctx.moveTo(0, 1024);
      ctx.lineTo(0, layer.yBase);
      const peaks = 5;
      const segW = 1024 / peaks;
      for (let i = 0; i < peaks; i++) {
        const x1 = segW * i + segW * 0.3;
        const x2 = segW * i + segW * 0.7;
        const x3 = segW * (i + 1);
        const peakY = layer.yBase - (20 + Math.random() * 50);
        const valleyY = layer.yBase + (5 + Math.random() * 20);
        ctx.bezierCurveTo(x1, peakY, x2, peakY + 12, x3, valleyY);
      }
      ctx.lineTo(1024, 1024);
      ctx.closePath();
      ctx.fillStyle = `rgba(${layer.color},${layer.opacity})`;
      ctx.fill();
    }

    const texture = new THREE.CanvasTexture(canvas);
    this.scene.background = texture;
  }

  createBodyBackground() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    const canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');

    // Base warm honey-brown wood fill
    const baseGrad = ctx.createLinearGradient(0, 0, 0, h);
    baseGrad.addColorStop(0, '#A08030');
    baseGrad.addColorStop(0.3, '#937225');
    baseGrad.addColorStop(0.5, '#9B7830');
    baseGrad.addColorStop(0.7, '#8E6E28');
    baseGrad.addColorStop(1, '#8A6820');
    ctx.fillStyle = baseGrad;
    ctx.fillRect(0, 0, w, h);

    // Dense horizontal wood grain lines
    for (let y = 0; y < h; y += 1) {
      const r = Math.random();
      if (r < 0.3) {
        // Fine grain line — dark
        const alpha = 0.04 + Math.random() * 0.08;
        ctx.fillStyle = `rgba(60,35,10,${alpha})`;
        ctx.fillRect(0, y, w, 1);
      } else if (r < 0.38) {
        // Light highlight grain line
        const alpha = 0.03 + Math.random() * 0.06;
        ctx.fillStyle = `rgba(200,170,100,${alpha})`;
        ctx.fillRect(0, y, w, 1);
      }
    }

    // Broader darker grain bands every ~40-80px
    for (let y = 30; y < h; y += 40 + Math.random() * 40) {
      const bandH = 2 + Math.random() * 3;
      ctx.fillStyle = `rgba(55,30,8,${0.1 + Math.random() * 0.1})`;
      ctx.fillRect(0, y, w, bandH);
    }

    // Subtle vertical color variation (simulates panel edges)
    const panelW = 180 + Math.random() * 120;
    for (let x = 0; x < w; x += panelW) {
      const shift = Math.random() > 0.5;
      ctx.fillStyle = shift
        ? `rgba(50,30,10,0.04)`
        : `rgba(180,150,80,0.03)`;
      ctx.fillRect(x, 0, panelW, h);
      // Panel seam — thin dark vertical line
      ctx.fillStyle = `rgba(50,30,10,0.12)`;
      ctx.fillRect(x, 0, 1, h);
    }

    document.body.style.backgroundImage = `url(${canvas.toDataURL()})`;
    document.body.style.backgroundSize = 'cover';
  }

  createTable() {
    // Procedural rice paper texture for table surface
    const texCanvas = document.createElement('canvas');
    texCanvas.width = 1024;
    texCanvas.height = 1024;
    const tctx = texCanvas.getContext('2d');

    // Base warm cream/parchment with uneven aging
    const baseGrad = tctx.createRadialGradient(512, 512, 0, 512, 512, 600);
    baseGrad.addColorStop(0, '#f5ead0');
    baseGrad.addColorStop(0.4, '#f3e8cc');
    baseGrad.addColorStop(0.7, '#f0e4c6');
    baseGrad.addColorStop(1, '#ede0c0');
    tctx.fillStyle = baseGrad;
    tctx.fillRect(0, 0, 1024, 1024);

    // Uneven base tone — large soft patches for natural paper irregularity
    for (let i = 0; i < 8; i++) {
      const x = Math.random() * 1024;
      const y = Math.random() * 1024;
      const r = Math.random() * 250 + 150;
      const ug = tctx.createRadialGradient(x, y, 0, x, y, r);
      const tone = Math.random() > 0.5 ? '200,180,140' : '170,150,110';
      ug.addColorStop(0, `rgba(${tone},${Math.random() * 0.06 + 0.02})`);
      ug.addColorStop(0.6, `rgba(${tone},${Math.random() * 0.03})`);
      ug.addColorStop(1, `rgba(${tone},0)`);
      tctx.fillStyle = ug;
      tctx.fillRect(x - r, y - r, r * 2, r * 2);
    }

    // Fine noise grain — tiny dots across surface
    for (let i = 0; i < 50000; i++) {
      const x = Math.random() * 1024;
      const y = Math.random() * 1024;
      const size = Math.random() * 1.5 + 0.5;
      const alpha = Math.random() * 0.04 + 0.005;
      const shade = Math.floor(Math.random() * 40 + 130);
      tctx.fillStyle = `rgba(${shade},${shade - 20},${shade - 50},${alpha})`;
      tctx.fillRect(x, y, size, size);
    }

    // Rice paper fiber grain — horizontal strands
    for (let i = 0; i < 40000; i++) {
      const x = Math.random() * 1024;
      const y = Math.random() * 1024;
      const w = Math.random() * 8 + 2;
      const h = Math.random() * 1.2 + 0.3;
      const alpha = Math.random() * 0.05 + 0.008;
      tctx.fillStyle = `rgba(155,135,95,${alpha})`;
      tctx.fillRect(x, y, w, h);
    }

    // Longer horizontal fiber lines — visible paper grain
    tctx.lineWidth = 0.5;
    for (let i = 0; i < 200; i++) {
      const y = Math.random() * 1024;
      const x0 = Math.random() * 800;
      const len = Math.random() * 120 + 30;
      const alpha = Math.random() * 0.04 + 0.01;
      tctx.strokeStyle = `rgba(150,130,90,${alpha})`;
      tctx.beginPath();
      tctx.moveTo(x0, y);
      // Slightly wavy line
      const mid = x0 + len / 2;
      const yOff = (Math.random() - 0.5) * 2;
      tctx.quadraticCurveTo(mid, y + yOff, x0 + len, y + (Math.random() - 0.5) * 1.5);
      tctx.stroke();
    }

    // Vertical fibers (cross-grain, fewer)
    for (let i = 0; i < 10000; i++) {
      const x = Math.random() * 1024;
      const y = Math.random() * 1024;
      const w = Math.random() * 1 + 0.3;
      const h = Math.random() * 6 + 1;
      const alpha = Math.random() * 0.035;
      tctx.fillStyle = `rgba(140,120,80,${alpha})`;
      tctx.fillRect(x, y, w, h);
    }

    // Age/discoloration spots — darker warm patches
    for (let i = 0; i < 35; i++) {
      const x = Math.random() * 1024;
      const y = Math.random() * 1024;
      const r = Math.random() * 60 + 15;
      const sGrad = tctx.createRadialGradient(x, y, 0, x, y, r);
      const intensity = Math.random() * 0.06 + 0.02;
      sGrad.addColorStop(0, `rgba(160,130,80,${intensity})`);
      sGrad.addColorStop(0.5, `rgba(170,140,90,${intensity * 0.5})`);
      sGrad.addColorStop(1, 'rgba(170,140,90,0)');
      tctx.fillStyle = sGrad;
      tctx.fillRect(x - r, y - r, r * 2, r * 2);
    }

    // Foxing spots — small dark age marks (like old paper)
    for (let i = 0; i < 20; i++) {
      const x = Math.random() * 1024;
      const y = Math.random() * 1024;
      const r = Math.random() * 8 + 3;
      const fg = tctx.createRadialGradient(x, y, 0, x, y, r);
      fg.addColorStop(0, `rgba(140,110,60,${Math.random() * 0.08 + 0.02})`);
      fg.addColorStop(1, 'rgba(140,110,60,0)');
      tctx.fillStyle = fg;
      tctx.beginPath();
      tctx.arc(x, y, r, 0, Math.PI * 2);
      tctx.fill();
    }

    // Edge darkening — vignette for natural aging at edges
    const edgeGrad = tctx.createRadialGradient(512, 512, 300, 512, 512, 720);
    edgeGrad.addColorStop(0, 'rgba(0,0,0,0)');
    edgeGrad.addColorStop(1, 'rgba(80,60,30,0.06)');
    tctx.fillStyle = edgeGrad;
    tctx.fillRect(0, 0, 1024, 1024);

    const tableTexture = new THREE.CanvasTexture(texCanvas);
    tableTexture.wrapS = THREE.RepeatWrapping;
    tableTexture.wrapT = THREE.RepeatWrapping;

    // Main table surface
    const tableGeo = new THREE.BoxGeometry(14, 0.15, 14);
    const tableMat = new THREE.MeshStandardMaterial({
      map: tableTexture,
      color: 0xf5ead0,
      roughness: 0.88,
      metalness: 0.0,
    });
    const table = new THREE.Mesh(tableGeo, tableMat);
    table.position.y = -0.075;
    table.receiveShadow = true;
    this.scene.add(table);

    // Table border/frame — dark lacquered wood
    const borderGeo = new THREE.BoxGeometry(15.0, 0.35, 15.0);
    const borderMat = new THREE.MeshStandardMaterial({
      color: 0x3a2818,
      roughness: 0.55,
      metalness: 0.15,
    });
    const border = new THREE.Mesh(borderGeo, borderMat);
    border.position.y = -0.20;
    border.receiveShadow = true;
    this.scene.add(border);

    // Inner playing area — slightly lighter parchment overlay
    const innerGeo = new THREE.PlaneGeometry(10.5, 10.5);
    const innerMat = new THREE.MeshStandardMaterial({
      color: 0xf5eed6,
      roughness: 0.92,
      metalness: 0.0,
      transparent: true,
      opacity: 0.35,
    });
    const inner = new THREE.Mesh(innerGeo, innerMat);
    inner.rotation.x = -Math.PI / 2;
    inner.position.y = 0.002;
    inner.receiveShadow = true;
    this.scene.add(inner);

    // Thin decorative border lines on playing area (ink brush feel)
    const lineCanvas = document.createElement('canvas');
    lineCanvas.width = 512;
    lineCanvas.height = 512;
    const lctx = lineCanvas.getContext('2d');
    lctx.clearRect(0, 0, 512, 512);
    const lineEdgeGrad = lctx.createRadialGradient(256, 256, 180, 256, 256, 280);
    lineEdgeGrad.addColorStop(0, 'rgba(0,0,0,0)');
    lineEdgeGrad.addColorStop(1, 'rgba(60,40,20,0.08)');
    lctx.fillStyle = lineEdgeGrad;
    lctx.fillRect(0, 0, 512, 512);
    lctx.strokeStyle = 'rgba(80,60,40,0.18)';
    lctx.lineWidth = 2;
    lctx.strokeRect(20, 20, 472, 472);
    lctx.strokeStyle = 'rgba(80,60,40,0.12)';
    lctx.lineWidth = 1;
    lctx.strokeRect(30, 30, 452, 452);
    const lineTexture = new THREE.CanvasTexture(lineCanvas);
    const lineGeo = new THREE.PlaneGeometry(11, 11);
    const lineMat = new THREE.MeshStandardMaterial({
      map: lineTexture,
      transparent: true,
      roughness: 1,
      metalness: 0,
    });
    const lineOverlay = new THREE.Mesh(lineGeo, lineMat);
    lineOverlay.rotation.x = -Math.PI / 2;
    lineOverlay.position.y = 0.004;
    this.scene.add(lineOverlay);

    // Brass corner brackets on table border
    const bracketMat = new THREE.MeshStandardMaterial({
      color: 0xc8a84a,
      roughness: 0.35,
      metalness: 0.7,
    });
    const cornerPositions = [
      { x: -7.3, z: -7.3, rot: 0 },
      { x: 7.3, z: -7.3, rot: Math.PI / 2 },
      { x: 7.3, z: 7.3, rot: Math.PI },
      { x: -7.3, z: 7.3, rot: -Math.PI / 2 },
    ];
    for (const cp of cornerPositions) {
      const bracketGroup = new THREE.Group();
      // L-shaped bracket: two arms
      const armGeo = new THREE.BoxGeometry(1.2, 0.06, 0.18);
      const arm1 = new THREE.Mesh(armGeo, bracketMat);
      arm1.position.set(0.5, 0, 0);
      bracketGroup.add(arm1);
      const arm2 = new THREE.Mesh(armGeo, bracketMat);
      arm2.rotation.y = Math.PI / 2;
      arm2.position.set(0, 0, 0.5);
      bracketGroup.add(arm2);
      // Small corner nub
      const nubGeo = new THREE.BoxGeometry(0.25, 0.08, 0.25);
      const nub = new THREE.Mesh(nubGeo, bracketMat);
      bracketGroup.add(nub);

      bracketGroup.position.set(cp.x, 0.01, cp.z);
      bracketGroup.rotation.y = cp.rot;
      this.scene.add(bracketGroup);
    }
  }

  createInkDecorations() {
    const canvas = document.createElement('canvas');
    canvas.width = 1024;
    canvas.height = 1024;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, 1024, 1024);

    // === Bold Ens\u014d circle ink brush stroke ===
    ctx.save();
    ctx.translate(512, 512);
    const ensoR = 126, nSteps = 200, gapA = 0.4;
    for (let pass = 0; pass < 3; pass++) {
      ctx.beginPath();
      const alpha = [0.22, 0.17, 0.12][pass];
      const lw = [10, 13, 18][pass];
      for (let i = 0; i < nSteps; i++) {
        const t = i / nSteps;
        const ang = gapA + t * (Math.PI * 2 - gapA * 2);
        const wobble = Math.sin(t * 17) * 1.5 + Math.cos(t * 23) * 1;
        const r = ensoR + pass * 2 + wobble;
        const x = Math.cos(ang) * r, y = Math.sin(ang) * r;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.strokeStyle = 'rgba(90,80,70,' + alpha + ')';
      ctx.lineWidth = lw;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.stroke();
    }
    for (let i = 0; i < 8; i++) {
      const ang = gapA + Math.random() * 0.3;
      const r = ensoR + (Math.random() - 0.5) * 30;
      ctx.beginPath();
      ctx.arc(Math.cos(ang) * r, Math.sin(ang) * r, Math.random() * 3 + 1, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(90,80,70,' + (Math.random() * 0.1 + 0.05) + ')';
      ctx.fill();
    }
    ctx.restore();

    // Vermillion seal stamp
    ctx.save();
    ctx.translate(920, 100);
    ctx.fillStyle = 'rgba(179,58,42,0.35)';
    ctx.fillRect(-28, -28, 56, 56);
    ctx.strokeStyle = 'rgba(179,58,42,0.45)';
    ctx.lineWidth = 2;
    ctx.strokeRect(-26, -26, 52, 52);
    ctx.fillStyle = 'rgba(179,58,42,0.40)';
    ctx.font = 'bold 22px "Ma Shan Zheng", serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('\u96C0', 0, 0);
    ctx.restore();

    const texture = new THREE.CanvasTexture(canvas);
    const decoGeo = new THREE.PlaneGeometry(10, 10);
    const decoMat = new THREE.MeshStandardMaterial({
      map: texture, transparent: true, roughness: 1, metalness: 0, depthWrite: false,
    });
    const deco = new THREE.Mesh(decoGeo, decoMat);
    deco.rotation.x = -Math.PI / 2;
    deco.position.y = 0.005;
    this.scene.add(deco);

    // Bamboo corner motifs — load PNG texture
    const loader = new THREE.TextureLoader();
    loader.load('assets/bamboo-corner.png', (bambooTex) => {
      const bambooW = 3.8, bambooH = 3.8;
      const bambooGeo = new THREE.PlaneGeometry(bambooW, bambooH);
      // Bottom-left corner
      const bambooMatBL = new THREE.MeshStandardMaterial({
        map: bambooTex, transparent: true, opacity: 0.85, roughness: 1, metalness: 0, depthWrite: false,
      });
      const bambooBL = new THREE.Mesh(bambooGeo, bambooMatBL);
      bambooBL.rotation.x = -Math.PI / 2;
      bambooBL.position.set(-3.8, 0.011, 3.8);
      this.scene.add(bambooBL);
      // Bottom-right corner (mirror horizontally)
      const bambooTexBR = bambooTex.clone();
      bambooTexBR.wrapS = THREE.RepeatWrapping;
      bambooTexBR.repeat.x = -1;
      bambooTexBR.offset.x = 1;
      bambooTexBR.needsUpdate = true;
      const bambooMatBR = new THREE.MeshStandardMaterial({
        map: bambooTexBR, transparent: true, opacity: 0.85, roughness: 1, metalness: 0, depthWrite: false,
      });
      const bambooBR = new THREE.Mesh(bambooGeo, bambooMatBR);
      bambooBR.rotation.x = -Math.PI / 2;
      bambooBR.position.set(3.8, 0.011, 3.8);
      this.scene.add(bambooBR);
    });

    // Cloud wisps overlay — load PNG texture
    loader.load('assets/cloud-wisps.png', (cloudTex) => {
      const cloudGeo = new THREE.PlaneGeometry(9.5, 9.5);
      const cloudMat = new THREE.MeshStandardMaterial({
        map: cloudTex, transparent: true, opacity: 0.75, roughness: 1, metalness: 0, depthWrite: false,
      });
      const cloud = new THREE.Mesh(cloudGeo, cloudMat);
      cloud.rotation.x = -Math.PI / 2;
      cloud.position.y = 0.012;
      this.scene.add(cloud);
    });
  }

  createWindIndicators() {
    // Wind tiles in a diamond pattern in the center of the table
    const winds = [
      { char: '東', color: '#2a2018', x: 0.55, z: 0 },     // East - right
      { char: '南', color: '#2a2018', x: 0, z: 0.55 },      // South - bottom
      { char: '西', color: '#2a2018', x: -0.55, z: 0 },     // West - left
      { char: '北', color: '#2a2018', x: 0, z: -0.55 },     // North - top
    ];

    for (const w of winds) {
      const tile = { suit: 'winds', wind: w.char === '東' ? 'East' : w.char === '南' ? 'South' : w.char === '西' ? 'West' : 'North' };
      const mesh = this.create3DTile(tile, false);
      mesh.position.set(w.x * 1.3, 0.15, w.z * 1.3);
      mesh.scale.set(0.975, 0.975, 0.975);
      this.scene.add(mesh);

      // Subtle glow beneath each wind tile

    }
  }

  createTileTexture(tile) {
    const key = getTileKey(tile);
    if (this.tileTextures[key]) return this.tileTextures[key];

    // Higher resolution for crisp characters
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 352;
    const ctx = canvas.getContext('2d');

    // Tile side/edge color (visible around the rounded face)
    ctx.fillStyle = '#b0986c';
    ctx.fillRect(0, 0, 256, 352);

    // Rounded face rectangle — matches CSS hand tile appearance
    const r = 20; // corner radius
    const m = 10;  // margin from edge (shows the tan border)
    ctx.beginPath();
    ctx.moveTo(m + r, m);
    ctx.lineTo(256 - m - r, m);
    ctx.arcTo(256 - m, m, 256 - m, m + r, r);
    ctx.lineTo(256 - m, 352 - m - r);
    ctx.arcTo(256 - m, 352 - m, 256 - m - r, 352 - m, r);
    ctx.lineTo(m + r, 352 - m);
    ctx.arcTo(m, 352 - m, m, 352 - m - r, r);
    ctx.lineTo(m, m + r);
    ctx.arcTo(m, m, m + r, m, r);
    ctx.closePath();

    // Fill with white-cream gradient (bright white center)
    const faceGrad = ctx.createLinearGradient(0, 0, 0, 352);
    faceGrad.addColorStop(0, '#ffffff');
    faceGrad.addColorStop(0.5, '#ffffff');
    faceGrad.addColorStop(1, '#f5f0e8');
    ctx.fillStyle = faceGrad;
    ctx.fill();

    // Visible border on the rounded face
    ctx.strokeStyle = 'rgba(160,140,110,0.5)';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    if (key.startsWith('dots-')) {
      // Draw actual circles for dots tiles instead of text
      const dotNum = parseInt(key.split('-')[1]);
      const layouts = {
        1: { r: 42, pos: [[128, 176]] },
        2: { r: 30, pos: [[128, 116], [128, 236]] },
        3: { r: 26, pos: [[172, 96], [128, 176], [84, 256]] },
        4: { r: 26, pos: [[88, 116], [168, 116], [88, 236], [168, 236]] },
        5: { r: 24, pos: [[84, 108], [172, 108], [128, 176], [84, 244], [172, 244]] },
        6: { r: 22, pos: [[88, 96], [168, 96], [88, 176], [168, 176], [88, 256], [168, 256]] },
        7: { r: 20, pos: [[128, 82], [84, 168], [128, 168], [172, 168], [84, 260], [128, 260], [172, 260]] },
        8: { r: 20, pos: [[80, 96], [128, 96], [176, 96], [104, 176], [152, 176], [80, 256], [128, 256], [176, 256]] },
        9: { r: 20, pos: [[80, 96], [128, 96], [176, 96], [80, 176], [128, 176], [176, 176], [80, 256], [128, 256], [176, 256]] },
      };
      const layout = layouts[dotNum];
      if (layout) {
        const { r, pos } = layout;
        if (dotNum === 1) {
          // Ornate 1-dot: elaborate multi-ring concentric design
          const cx = 128, cy = 176, R = 56;

          // Outermost ring - deep teal
          ctx.beginPath();
          ctx.arc(cx, cy, R, 0, Math.PI * 2);
          ctx.fillStyle = '#1a5a6a';
          ctx.fill();
          ctx.strokeStyle = '#0e3e4e';
          ctx.lineWidth = 3;
          ctx.stroke();

          // Decorative ray pattern between rings
          ctx.save();
          ctx.translate(cx, cy);
          for (let i = 0; i < 16; i++) {
            const angle = (i / 16) * Math.PI * 2;
            ctx.beginPath();
            ctx.moveTo(Math.cos(angle) * R * 0.65, Math.sin(angle) * R * 0.65);
            ctx.lineTo(Math.cos(angle) * R * 0.88, Math.sin(angle) * R * 0.88);
            ctx.strokeStyle = '#5ababa';
            ctx.lineWidth = 2;
            ctx.stroke();
          }
          ctx.restore();

          // Second ring
          ctx.beginPath();
          ctx.arc(cx, cy, R * 0.72, 0, Math.PI * 2);
          ctx.strokeStyle = '#3a9aaa';
          ctx.lineWidth = 2.5;
          ctx.stroke();

          // Middle filled band
          ctx.beginPath();
          ctx.arc(cx, cy, R * 0.6, 0, Math.PI * 2);
          ctx.fillStyle = '#2a7a8a';
          ctx.fill();
          ctx.strokeStyle = '#1a5a6a';
          ctx.lineWidth = 2;
          ctx.stroke();

          // Third concentric ring
          ctx.beginPath();
          ctx.arc(cx, cy, R * 0.45, 0, Math.PI * 2);
          ctx.strokeStyle = '#4abaca';
          ctx.lineWidth = 2;
          ctx.stroke();

          // Inner decorative dots around center
          for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            ctx.beginPath();
            ctx.arc(
              cx + Math.cos(angle) * R * 0.33,
              cy + Math.sin(angle) * R * 0.33,
              2.5, 0, Math.PI * 2
            );
            ctx.fillStyle = '#6adaea';
            ctx.fill();
          }

          // Inner core
          ctx.beginPath();
          ctx.arc(cx, cy, R * 0.2, 0, Math.PI * 2);
          ctx.fillStyle = '#4abaca';
          ctx.fill();

          // Center highlight dot
          ctx.beginPath();
          ctx.arc(cx, cy, R * 0.08, 0, Math.PI * 2);
          ctx.fillStyle = '#8aeafa';
          ctx.fill();

          // Specular highlight for 3D feel
          ctx.beginPath();
          ctx.arc(cx - R * 0.18, cy - R * 0.2, R * 0.15, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255,255,255,0.12)';
          ctx.fill();
        } else {
          // Multicolored dots matching traditional mahjong patterns
          const dotColors = {
            green: { fill: '#2a8a6a', inner: '#3a9a7a', stroke: '#1a6a4a' },
            red:   { fill: '#c03030', inner: '#d04545', stroke: '#8a1a1a' },
            blue:  { fill: '#2a4a8a', inner: '#3a5a9a', stroke: '#1a3a6a' }
          };
          const colorPatterns = {
            2: ['green','red'],
            3: ['green','red','green'],
            4: ['green','red','red','green'],
            5: ['green','red','blue','green','red'],
            6: ['green','red','green','red','green','red'],
            7: ['green','red','green','blue','green','red','green'],
            8: ['green','red','green','red','red','green','red','green'],
            9: ['green','red','green','red','blue','red','green','red','green']
          };
          const pattern = colorPatterns[dotNum] || [];
          for (let i = 0; i < pos.length; i++) {
            const [cx, cy] = pos[i];
            const c = dotColors[pattern[i] || 'green'];

            // Outer filled circle
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fillStyle = c.fill;
            ctx.fill();
            ctx.strokeStyle = c.stroke;
            ctx.lineWidth = r * 0.15;
            ctx.stroke();

            // Inner concentric ring
            ctx.beginPath();
            ctx.arc(cx, cy, r * 0.55, 0, Math.PI * 2);
            ctx.fillStyle = c.inner;
            ctx.fill();
            ctx.strokeStyle = c.stroke;
            ctx.lineWidth = r * 0.1;
            ctx.stroke();

            // Subtle highlight for depth
            ctx.beginPath();
            ctx.arc(cx - r * 0.15, cy - r * 0.18, r * 0.22, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.fill();
          }
        }
      }
    } else if (key.startsWith('bamboo-')) {
      // Draw bamboo stick artwork
      const bambooNum = parseInt(key.split('-')[1]);

      if (bambooNum === 1) {
        // Traditional 1-bamboo is a stylized bird/sparrow
        ctx.save();
        ctx.translate(128, 176);
        // Body — green oval
        ctx.beginPath();
        ctx.ellipse(0, 0, 36, 28, -0.3, 0, Math.PI * 2);
        ctx.fillStyle = '#2a7a3a';
        ctx.fill();
        ctx.strokeStyle = '#1a5a2a';
        ctx.lineWidth = 2;
        ctx.stroke();
        // Head
        ctx.beginPath();
        ctx.arc(-30, -20, 16, 0, Math.PI * 2);
        ctx.fillStyle = '#2a7a3a';
        ctx.fill();
        ctx.stroke();
        // Red head detail / crest
        ctx.beginPath();
        ctx.arc(-32, -28, 8, 0, Math.PI * 2);
        ctx.fillStyle = '#c0392b';
        ctx.fill();
        // Eye
        ctx.beginPath();
        ctx.arc(-34, -18, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#1a1a1a';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(-34.5, -18.5, 1, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
        // Beak
        ctx.beginPath();
        ctx.moveTo(-46, -18);
        ctx.lineTo(-52, -16);
        ctx.lineTo(-46, -14);
        ctx.closePath();
        ctx.fillStyle = '#d4a017';
        ctx.fill();
        // Wing detail
        ctx.beginPath();
        ctx.ellipse(6, -4, 22, 14, -0.2, 0, Math.PI * 2);
        ctx.fillStyle = '#238b3a';
        ctx.fill();
        ctx.strokeStyle = '#1a5a2a';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Wing feather lines
        for (let i = 0; i < 4; i++) {
          ctx.beginPath();
          ctx.moveTo(-6 + i * 9, -12 + i * 2);
          ctx.quadraticCurveTo(4 + i * 8, 2, 14 + i * 6, 12);
          ctx.strokeStyle = '#1a5a2a';
          ctx.lineWidth = 1;
          ctx.stroke();
        }
        // Tail feathers
        ctx.beginPath();
        ctx.moveTo(30, -6);
        ctx.quadraticCurveTo(50, -20, 58, -34);
        ctx.strokeStyle = '#1a5a2a';
        ctx.lineWidth = 2.5;
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(32, 0);
        ctx.quadraticCurveTo(52, -10, 62, -24);
        ctx.strokeStyle = '#238b3a';
        ctx.lineWidth = 2;
        ctx.stroke();
        // Feet
        ctx.strokeStyle = '#d4a017';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-8, 26);
        ctx.lineTo(-8, 38);
        ctx.lineTo(-16, 44);
        ctx.moveTo(-8, 38);
        ctx.lineTo(-4, 44);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(8, 26);
        ctx.lineTo(8, 38);
        ctx.lineTo(2, 44);
        ctx.moveTo(8, 38);
        ctx.lineTo(14, 44);
        ctx.stroke();
        ctx.restore();
      } else {
        // bamboo-2 through bamboo-9: draw green bamboo sticks
        const stickLayouts = {
          2: [[108, 80], [148, 80]],
          3: [[88, 80], [128, 80], [168, 80]],
          4: [[98, 80], [158, 80], [98, 212], [158, 212]],
          5: [[78, 80], [128, 80], [178, 80], [98, 212], [158, 212]],
          6: [[98, 80], [158, 80], [98, 146], [158, 146], [98, 212], [158, 212]],
          7: [[78, 80], [128, 80], [178, 80], [78, 198], [128, 198], [178, 198], [128, 139]],
          8: [[98, 80], [158, 80], [98, 146], [158, 146], [98, 212], [158, 212], [98, 278], [158, 278]],
          9: [[78, 80], [128, 80], [178, 80], [78, 156], [128, 156], [178, 156], [78, 232], [128, 232], [178, 232]],
        };
        const sticks = stickLayouts[bambooNum] || [];
        // Adjust stick dimensions based on count
        let stickW, stickH, segments;
        if (bambooNum <= 3) { stickW = 20; stickH = 120; segments = 5; }
        else if (bambooNum <= 6) { stickW = 20; stickH = 100; segments = 4; }
        else { stickW = 18; stickH = 80; segments = 3; }

        for (const [cx, cy] of sticks) {
          const x = cx - stickW / 2;
          // Draw rounded bamboo stick
          const r = stickW / 2;
          ctx.beginPath();
          ctx.moveTo(x + r, cy);
          ctx.lineTo(x + stickW - r, cy);
          ctx.arcTo(x + stickW, cy, x + stickW, cy + r, r);
          ctx.lineTo(x + stickW, cy + stickH - r);
          ctx.arcTo(x + stickW, cy + stickH, x + stickW - r, cy + stickH, r);
          ctx.lineTo(x + r, cy + stickH);
          ctx.arcTo(x, cy + stickH, x, cy + stickH - r, r);
          ctx.lineTo(x, cy + r);
          ctx.arcTo(x, cy, x + r, cy, r);
          ctx.closePath();
          // Gradient fill for 3D look
          const grad = ctx.createLinearGradient(x, cy, x + stickW, cy);
          grad.addColorStop(0, '#1e6e2e');
          grad.addColorStop(0.3, '#2a7a3a');
          grad.addColorStop(0.6, '#34944a');
          grad.addColorStop(1, '#1e6e2e');
          ctx.fillStyle = grad;
          ctx.fill();
          ctx.strokeStyle = '#1a5a2a';
          ctx.lineWidth = 1.5;
          ctx.stroke();

          // Segment lines (bamboo nodes)
          const segSpacing = stickH / (segments + 1);
          for (let s = 1; s <= segments; s++) {
            const sy = cy + s * segSpacing;
            ctx.beginPath();
            ctx.moveTo(x + 2, sy);
            ctx.lineTo(x + stickW - 2, sy);
            ctx.strokeStyle = '#1a5a2a';
            ctx.lineWidth = 2;
            ctx.stroke();
            // Slight node bulge highlight
            ctx.beginPath();
            ctx.moveTo(x + 3, sy - 2);
            ctx.lineTo(x + stickW - 3, sy - 2);
            ctx.strokeStyle = 'rgba(80,180,80,0.3)';
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
      }

    } else if (key.startsWith('characters-')) {
      // Draw Chinese numeral + 萬 character with ink brush style
      const charNum = parseInt(key.split('-')[1]);
      const chineseNumerals = {
        1: '一', 2: '二', 3: '三', 4: '四', 5: '五',
        6: '六', 7: '七', 8: '八', 9: '九'
      };
      const numChar = chineseNumerals[charNum] || String(charNum);
      const inkColor = '#8b1a1a';

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Chinese number on top — bold ink
      ctx.fillStyle = inkColor;
      ctx.font = 'bold 120px "Ma Shan Zheng", serif';
      ctx.fillText(numChar, 128, 118);

      // 萬 character below
      ctx.fillStyle = inkColor;
      ctx.font = 'bold 100px "Ma Shan Zheng", serif';
      ctx.fillText('萬', 128, 254);

      // Faint red seal/chop mark — bottom-right corner
      ctx.save();
      ctx.translate(210, 310);
      // Seal square
      ctx.fillStyle = 'rgba(180, 40, 30, 0.55)';
      ctx.fillRect(-16, -16, 32, 32);
      ctx.strokeStyle = 'rgba(140, 30, 20, 0.45)';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(-16, -16, 32, 32);
      // Tiny character inside seal
      ctx.fillStyle = 'rgba(255, 240, 220, 0.7)';
      ctx.font = 'bold 18px "Ma Shan Zheng", serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('萬', 0, 1);
      ctx.restore();

    } else {
      // Text rendering for honors, bonus tiles
      const label = getTileLabel(tile);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      if (label.bottom) {
        ctx.fillStyle = label.color;
        ctx.font = 'bold 100px "Ma Shan Zheng", serif';
        ctx.fillText(label.top, 128, 120);
        ctx.fillStyle = label.color;
        ctx.font = 'bold 84px "Ma Shan Zheng", serif';
        ctx.fillText(label.bottom, 128, 254);

      } else if (key.startsWith('winds-')) {
        // === WIND TILES: calligraphic with seal circle & compass dots ===
        const cx = 128, cy = 176;

        // Subtle circular seal border
        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, 88, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(60, 50, 40, 0.15)';
        ctx.lineWidth = 2.5;
        ctx.stroke();
        // Inner circle
        ctx.beginPath();
        ctx.arc(cx, cy, 82, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(60, 50, 40, 0.08)';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.restore();

        // Compass-like cardinal dots
        const dotR = 4;
        const dotDist = 96;
        const cardinals = [[0, -1], [0, 1], [-1, 0], [1, 0]]; // N, S, W, E
        ctx.save();
        for (const [dx, dy] of cardinals) {
          ctx.beginPath();
          ctx.arc(cx + dx * dotDist, cy + dy * dotDist, dotR, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(40, 35, 30, 0.18)';
          ctx.fill();
        }
        ctx.restore();

        // Brush stroke texture: draw character multiple times with slight offsets at low opacity
        ctx.save();
        ctx.font = 'bold 140px "Ma Shan Zheng", serif';
