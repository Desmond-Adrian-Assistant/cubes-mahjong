<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paper & Ink Mahjong 🀄</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%; width: 100%;
  background: linear-gradient(170deg, #f5e6c8 0%, #ede0cc 30%, #e8d5b0 70%, #ddc8a0 100%);
  font-family: 'ZCOOL XiaoWei', 'Ma Shan Zheng', serif;
  color: #3a3028;
  overflow: hidden;
  user-select: none;
}

canvas#game-canvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 0;
}

/* ========== UI OVERLAY ========== */
#ui-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; z-index: 10;
}
#ui-overlay > * { pointer-events: auto; }

/* ========== TOP BAR ========== */
.top-bar {
  display: flex; justify-content: center; align-items: center;
  padding: 10px 16px;
  position: relative;
}
.header-center {
  text-align: center;
}
.header-title {
  font-size: 20px;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  color: #3a3028;
  letter-spacing: 3px;
  font-weight: 600;
}
.header-subtitle {
  font-size: 12px;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  color: #7a6a5a;
  letter-spacing: 1px;
  margin-top: 2px;
}
.top-btns {
  display: flex; gap: 8px;
  position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
}
.menu-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(245,240,232,0.92);
  border: 1px solid rgba(160,140,110,0.3);
  color: #5a4a3a; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(80,60,30,0.08);
  backdrop-filter: blur(10px);
  transition: transform 0.2s;
  font-family: 'Ma Shan Zheng', serif;
}
.menu-btn:active { transform: scale(0.95); }

/* ========== PLAYER BUBBLES ========== */
.player-bubble {
  position: absolute;
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 30;
}
.bubble-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  border: 2px solid rgba(180,160,130,0.5);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  box-shadow: 0 3px 12px rgba(80,60,30,0.12);
  transition: all 0.3s;
  flex-shrink: 0;
  background: rgba(245,240,232,0.9);
}
.bubble-info {
  background: rgba(245,240,232,0.95);
  border-radius: 12px;
  padding: 6px 12px;
  box-shadow: 0 2px 8px rgba(80,60,30,0.08);
  line-height: 1.3;
  white-space: nowrap;
  border: 1px solid rgba(160,140,110,0.2);
}
.bubble-info .name {
  font-size: 13px; color: #4a3a28;
  font-family: 'Ma Shan Zheng', serif;
}
.bubble-info .score { font-size: 11px; color: #8a7a6a; }
.bubble-info .wind-seat {
  font-size: 11px; color: #b33a2a;
  display: inline-block; margin-left: 4px;
  font-family: 'Ma Shan Zheng', serif;
}
.player-bubble.active .bubble-avatar {
  border-color: #b33a2a;
  box-shadow: 0 3px 12px rgba(179,58,42,0.3), 0 0 0 4px rgba(179,58,42,0.15);
  animation: pulse 1.8s ease infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 3px 12px rgba(179,58,42,0.3), 0 0 0 4px rgba(179,58,42,0.15); }
  50% { box-shadow: 0 3px 12px rgba(179,58,42,0.3), 0 0 0 8px rgba(179,58,42,0.08); }
}

#p-north { top: 12px; left: 50%; transform: translateX(-50%); flex-direction: column; align-items: center; gap: 2px; }
#p-west { top: 45%; left: 12px; transform: translateY(-50%); }
#p-east { top: 45%; right: 12px; transform: translateY(-50%); flex-direction: row-reverse; }
#p-south { display: none; }

/* ========== PLAYER HAND (2D overlay at bottom) ========== */
.hand-tray {
  position: fixed;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(245,240,232,0.85);
  backdrop-filter: blur(16px);
  border-radius: 16px;
  padding: 8px 14px;
  display: flex;
  justify-content: center;
  gap: 3px;
  box-shadow: 0 -2px 20px rgba(80,60,30,0.1), inset 0 1px 0 rgba(255,255,255,0.5);
  border: 1px solid rgba(180,160,130,0.3);
  z-index: 25;
  max-width: 96%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.hand-tray::-webkit-scrollbar { height: 4px; }
.hand-tray::-webkit-scrollbar-thumb { background: rgba(160,140,110,0.3); border-radius: 2px; }

/* Tile in hand */
.tile {
  width: 64px; height: 84px; position: relative;
  cursor: pointer;
  transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
  transform-origin: bottom center;
  flex-shrink: 0;
}
.tile-body {
  width: 100%; height: 100%;
  border-radius: 8px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
  background: linear-gradient(160deg, #fafaf5 0%, #f5f0e6 60%, #ede8dc 100%);
  border: 1px solid rgba(160,140,110,0.4);
  box-shadow:
    0 2px 4px rgba(80,60,30,0.12),
    0 4px 10px rgba(80,60,30,0.08),
    0 1px 0 rgba(80,60,30,0.04),
    inset 0 1px 0 rgba(255,255,255,0.9),
    inset 0 -1px 2px rgba(160,140,110,0.1);
}
.tile .face {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 100%;
  padding: 4px;
  font-size: 36px;
  line-height: 1;
}
.tile .face .char-top {
  font-size: 27px;
  font-family: 'Ma Shan Zheng', serif;
  color: #2a2018;
  line-height: 1;
}
.tile .face .char-bottom {
  font-size: 22px;
  font-family: 'Ma Shan Zheng', serif;
  color: #b33a2a;
  line-height: 1;
}
.tile .face .tile-content {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 0;
  width: 100%; height: 100%;
}

.tile:hover {
  transform: translateY(-6px);
}
.tile:hover .tile-body {
  box-shadow:
    0 4px 12px rgba(200,170,80,0.25),
    0 6px 16px rgba(80,60,30,0.1),
    inset 0 1px 0 rgba(255,255,255,0.8);
  border-color: rgba(200,170,80,0.5);
}
.tile.selected { transform: translateY(-14px) scale(1.05); }
.tile.selected .tile-body {
  border-color: #c8a040;
  box-shadow:
    0 8px 24px rgba(200,160,64,0.3),
    0 0 0 2px rgba(200,160,64,0.4),
    0 0 20px rgba(200,170,80,0.15);
}
.tile.drawn { margin-left: 14px !important; }
.tile.drawn::after {
  content: ''; position: absolute; top: -3px; left: -3px; right: -3px; bottom: -3px;
  border: 2px dashed rgba(200,160,64,0.4);
  border-radius: 8px;
  pointer-events: none;
  animation: drawnPulse 2s ease infinite;
}
@keyframes drawnPulse {
  0%, 100% { border-color: rgba(200,160,64,0.4); }
  50% { border-color: rgba(200,160,64,0.15); }
}

/* ========== PLAYER LABEL ========== */
.player-label {
  position: fixed;
  bottom: 136px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 26;
}
.player-label .avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  background: rgba(245,240,232,0.9);
  border: 1px solid rgba(180,160,130,0.4);
  box-shadow: 0 2px 8px rgba(80,60,30,0.1);
}
.player-label .info {
  background: rgba(245,240,232,0.92);
  border-radius: 10px;
  padding: 4px 12px;
  border: 1px solid rgba(160,140,110,0.2);
}
.player-label .name {
  font-size: 13px; color: #4a3a28;
  font-family: 'Ma Shan Zheng', serif;
}
.player-label .score { font-size: 11px; color: #8a7a6a; margin-left: 6px; }

/* ========== ACTION BUTTONS ========== */
.action-bar {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: row;
  gap: 8px;
  z-index: 40;
}
.action-btn {
  border: none;
  border-radius: 20px;
  padding: 10px 22px;
  font-size: 14px;
  font-family: 'Ma Shan Zheng', serif;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 3px 10px rgba(80,60,30,0.15);
  display: none;
  min-width: 72px;
  text-align: center;
  letter-spacing: 1px;
}
.action-btn.visible { display: block; }
.action-btn:active { transform: scale(0.95); }

.action-btn.chi { background: linear-gradient(135deg, #5a8a6a, #4a7a5a); color: #fffff8; }
.action-btn.pong { background: linear-gradient(135deg, #8a6a4a, #7a5a3a); color: #fffff8; }
.action-btn.kong { background: linear-gradient(135deg, #5a5a6a, #4a4a5a); color: #fffff8; }
.action-btn.mahjong { background: linear-gradient(135deg, #c94030, #a83020); color: #fffff8; box-shadow: 0 3px 14px rgba(179,58,42,0.3); }
.action-btn.skip { background: linear-gradient(135deg, #b0a898, #9a9080); color: #fffff8; }
.action-btn.discard { background: linear-gradient(135deg, #c94030, #a83020); color: #fffff8; box-shadow: 0 3px 14px rgba(179,58,42,0.3); }
.action-btn.sort { background: rgba(245,240,232,0.95); color: #5a4a3a; border: 1px solid rgba(160,140,110,0.3); }

/* ========== CLAIM PANEL ========== */
.claim-panel {
  position: fixed;
  bottom: 140px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(245,240,232,0.97);
  backdrop-filter: blur(16px);
  border-radius: 16px;
  padding: 16px 20px;
  box-shadow: 0 8px 32px rgba(80,60,30,0.15);
  border: 1px solid rgba(160,140,110,0.3);
  display: none;
  flex-direction: column;
  gap: 8px;
  z-index: 50;
  max-width: 90%;
}
.claim-panel.visible { display: flex; }
.claim-panel-title {
  font-size: 15px; color: #5a4a3a;
  text-align: center; margin-bottom: 4px;
  font-family: 'Ma Shan Zheng', serif;
}
.claim-option {
  display: flex; align-items: center; gap: 10px;
  background: rgba(230,222,210,0.6);
  border-radius: 12px;
  padding: 8px 14px;
  cursor: pointer;
  transition: all 0.2s;
  border: 2px solid transparent;
}
.claim-option:hover {
  background: rgba(220,210,195,0.8);
  border-color: #b33a2a;
}
.claim-option .tiles-preview { display: flex; gap: 3px; }
.claim-option .preview-tile {
  width: 28px; height: 38px;
  border-radius: 4px;
  background: linear-gradient(160deg, #fffff8 0%, #f8f4ec 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  border: 1px solid rgba(160,140,110,0.3);
  box-shadow: 0 1px 3px rgba(80,60,30,0.1);
}
.claim-option .preview-tile.claimed {
  border-color: #b33a2a;
  box-shadow: 0 0 0 1px #b33a2a;
}
.claim-option .action-label {
  font-size: 14px; color: #5a4a3a;
  font-family: 'Ma Shan Zheng', serif;
}

/* ========== TURN INDICATOR ========== */
.turn-indicator {
  position: fixed;
  bottom: 138px;
  right: 16px;
  font-size: 13px;
  font-family: 'Ma Shan Zheng', serif;
  color: #fffff8;
  background: #5a4a3a;
  border-radius: 14px;
  padding: 5px 14px;
  box-shadow: 0 3px 10px rgba(80,60,30,0.2);
  white-space: nowrap;
  z-index: 35;
  transition: all 0.4s;
}
.turn-indicator.your-turn {
  background: #b33a2a;
  animation: turnPulse 2s ease infinite;
}
@keyframes turnPulse { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }

/* ========== TOAST ========== */
.toast {
  position: fixed; top: 38%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
  background: rgba(245,240,232,0.97);
  backdrop-filter: blur(16px);
  border-radius: 16px;
  padding: 16px 32px;
  font-size: 22px; color: #4a3a28;
  font-family: 'Ma Shan Zheng', serif;
  opacity: 0;
  transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none;
  z-index: 100;
  box-shadow: 0 8px 32px rgba(80,60,30,0.2);
  border: 1px solid rgba(160,140,110,0.3);
  text-align: center;
}
.toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

.ai-toast {
  position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%) scale(0);
  background: rgba(245,240,232,0.95);
  backdrop-filter: blur(16px);
  border-radius: 14px;
  padding: 12px 24px;
  font-size: 17px; color: #5a4a3a;
  font-family: 'Ma Shan Zheng', serif;
  opacity: 0;
  transition: all 0.4s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none;
  z-index: 99;
  box-shadow: 0 8px 24px rgba(80,60,30,0.12);
  border: 1px solid rgba(160,140,110,0.2);
  white-space: nowrap;
}
.ai-toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

/* ========== DISCARD OVERLAY ========== */
.discard-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(40,32,24,0.7);
  backdrop-filter: blur(6px);
  display: none;
  align-items: center; justify-content: center;
  z-index: 150;
}
.discard-overlay.show { display: flex; }
.discard-modal {
  background: rgba(248,244,236,0.98);
  border-radius: 20px;
  padding: 24px;
  max-width: 90vw;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 16px 48px rgba(40,30,20,0.3);
  border: 1px solid rgba(160,140,110,0.3);
  min-width: 320px;
}
.discard-modal h3 {
  font-family: 'Ma Shan Zheng', serif;
  font-size: 22px; color: #4a3a28;
  text-align: center; margin-bottom: 16px;
  font-weight: 400;
}
.discard-section {
  margin-bottom: 12px;
}
.discard-section-title {
  font-family: 'Ma Shan Zheng', serif;
  font-size: 16px; color: #8a7a6a;
  margin-bottom: 6px;
  padding-left: 4px;
}
.discard-grid {
  display: flex; flex-wrap: wrap; gap: 4px;
}
.discard-grid .dtile {
  width: 36px; height: 48px;
  border-radius: 4px;
  background: linear-gradient(160deg, #fffff8 0%, #f8f4ec 100%);
  border: 1px solid rgba(160,140,110,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: 0 1px 3px rgba(80,60,30,0.1);
}
.discard-close-bar {
  display: flex; gap: 8px; justify-content: center; margin-top: 16px;
}
.discard-close-bar button {
  font-family: 'Ma Shan Zheng', serif;
  font-size: 15px;
  padding: 8px 22px;
  border-radius: 14px;
  border: 1px solid rgba(160,140,110,0.3);
  cursor: pointer;
  transition: all 0.2s;
}
.discard-close-bar .close-btn {
  background: #5a4a3a; color: #fffff8; border: none;
}
.discard-close-bar .sort-btn {
  background: rgba(245,240,232,0.95); color: #5a4a3a;
}

/* ========== MELDS ========== */
.melds-area {
  position: fixed; display: flex; gap: 6px; flex-wrap: wrap; z-index: 12;
}
.melds-area.bottom { bottom: 142px; left: 16px; max-width: 45%; }
.melds-area.top { top: 70px; right: 16px; max-width: 40%; flex-direction: row-reverse; }
.melds-area.left { left: 70px; top: calc(45% + 60px); flex-direction: column; }
.melds-area.right { right: 70px; top: calc(45% + 60px); flex-direction: column; }

.meld-group {
  display: flex; gap: 2px;
  background: rgba(245,240,232,0.7);
  border-radius: 6px;
  padding: 3px;
  border: 1px solid rgba(160,140,110,0.2);
}
.meld-group.concealed { background: rgba(200,190,175,0.3); }
.meld-tile {
  width: 22px; height: 30px;
  border-radius: 4px;
  background: linear-gradient(160deg, #fffff8 0%, #f8f4ec 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  border: 1px solid rgba(160,140,110,0.25);
  box-shadow: 0 1px 2px rgba(80,60,30,0.06);
}
.meld-tile.facedown {
  background: linear-gradient(160deg, #d8d0c4 0%, #c8c0b4 100%);
}

/* ========== WALL INFO (center table) ========== */
.wall-info {
  display: none;
}
.wall-info .dealer {
  font-size: 22px; color: #b33a2a;
  font-family: 'Ma Shan Zheng', serif;
}
.wall-info .tiles-left { font-size: 10px; color: #8a7a6a; }

/* ========== MODAL ========== */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(40,32,24,0.5);
  backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center;
  z-index: 200;
}
.modal-overlay.show { display: flex; }
.modal {
  background: rgba(248,244,236,0.98);
  border-radius: 20px;
  padding: 28px 36px;
  box-shadow: 0 16px 48px rgba(40,30,20,0.25);
  text-align: center;
  max-width: 90%;
  min-width: 300px;
  border: 1px solid rgba(160,140,110,0.3);
}
.modal h2 {
  font-size: 28px; color: #4a3a28; margin-bottom: 14px;
  font-family: 'Ma Shan Zheng', serif; font-weight: 400;
}
.modal p { font-size: 15px; color: #8a7a6a; margin-bottom: 18px; }
.modal-btn {
  background: #b33a2a;
  border: none;
  border-radius: 16px;
  padding: 12px 32px;
  font-size: 17px;
  font-family: 'Ma Shan Zheng', serif;
  color: #fffff8;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(179,58,42,0.3);
  transition: all 0.2s;
}
.modal-btn:active { transform: scale(0.95); }

.score-table { margin: 18px 0; text-align: left; }
.score-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px;
  border-radius: 10px;
  margin: 6px 0;
  background: rgba(230,222,210,0.5);
}
.score-row.winner { background: rgba(179,58,42,0.1); }
.score-row .player-name { font-size: 14px; color: #4a3a28; font-family: 'Ma Shan Zheng', serif; }
.score-row .player-score { font-size: 14px; color: #4a3a28; }

/* ========== OPPONENT HAND COUNTS ========== */
.opp-hand-count {
  display: none;
}

/* ========== RESPONSIVE ========== */
@media (max-width: 600px) {
  .tile { width: 50px; height: 66px; }
  .tile .face { font-size: 28px; }
  .hand-tray { bottom: 60px; padding: 6px 10px; }
  .player-label { bottom: 116px; }
  .action-bar { bottom: 12px; }
  .melds-area.bottom { bottom: 120px; }
}
</style>
</head>
<body>

<canvas id="game-canvas"></canvas>

<div id="ui-overlay">
  <div class="top-bar">
    <div class="header-center">
      <div class="header-title">PAPER & INK MAHJONG</div>
      <div class="header-subtitle" id="header-subtitle">ROUND: 1/4 | EAST WINDS | TILES LEFT: 136</div>
    </div>
    <div class="top-btns">
      <button class="menu-btn" id="btn-discards" title="View Discards">棄</button>
      <button class="menu-btn" id="btn-sort-hand" title="Sort Hand">排</button>
    </div>
  </div>

  <!-- Player bubbles -->
  <div id="p-north" class="player-bubble">
    <div class="bubble-avatar">🐱</div>
    <div class="bubble-info">
      <span class="name">Mochi</span><span class="wind-seat" id="seat-north">N</span><br>
      <span class="score" id="score-north">25,000</span>
    </div>
    <div class="opp-hand-count" id="count-north">13</div>
  </div>
  <div id="p-west" class="player-bubble">
    <div class="bubble-avatar">🦊</div>
    <div class="bubble-info">
      <span class="name">Kitsune</span><span class="wind-seat" id="seat-west">W</span><br>
      <span class="score" id="score-west">25,000</span>
    </div>
    <div class="opp-hand-count" id="count-west">13</div>
  </div>
  <div id="p-east" class="player-bubble">
    <div class="bubble-avatar">🐰</div>
    <div class="bubble-info">
      <span class="name">Usagi</span><span class="wind-seat" id="seat-east">E</span><br>
      <span class="score" id="score-east">25,000</span>
    </div>
    <div class="opp-hand-count" id="count-east">13</div>
  </div>
  <div id="p-south" class="player-bubble">
    <div class="bubble-avatar">🐼</div>

<script>
// ============================================================
// PAPER & INK MAHJONG — Three.js 3D + HK Rules
// ============================================================

// ==================== TILE UNICODE MAP ====================
const TILE_UNICODE = {
  'bamboo-1': '🀐', 'bamboo-2': '🀑', 'bamboo-3': '🀒', 'bamboo-4': '🀓',
  'bamboo-5': '🀔', 'bamboo-6': '🀕', 'bamboo-7': '🀖', 'bamboo-8': '🀗', 'bamboo-9': '🀘',
  'dots-1': '🀙', 'dots-2': '🀚', 'dots-3': '🀛', 'dots-4': '🀜',
  'dots-5': '🀝', 'dots-6': '🀞', 'dots-7': '🀟', 'dots-8': '🀠', 'dots-9': '🀡',
  'characters-1': '🀇', 'characters-2': '🀈', 'characters-3': '🀉', 'characters-4': '🀊',
  'characters-5': '🀋', 'characters-6': '🀌', 'characters-7': '🀍', 'characters-8': '🀎', 'characters-9': '🀏',
  'winds-East': '🀀', 'winds-South': '🀁', 'winds-West': '🀂', 'winds-North': '🀃',
  'dragons-Red': '🀄', 'dragons-Green': '🀅', 'dragons-White': '🀆',
};

// Ink-style text labels for tiles (used on canvas textures)
const TILE_LABELS = {};
for (let i = 1; i <= 9; i++) {
  TILE_LABELS[`bamboo-${i}`] = { top: ['一','二','三','四','五','六','七','八','九'][i-1], bottom: '竹', color: '#2a5a3a' };
  TILE_LABELS[`dots-${i}`] = { top: ['一','二','三','四','五','六','七','八','九'][i-1], bottom: '筒', color: '#2a3a6a' };
  TILE_LABELS[`characters-${i}`] = { top: ['一','二','三','四','五','六','七','八','九'][i-1], bottom: '萬', color: '#6a2a2a' };
}
TILE_LABELS['winds-East'] = { top: '東', bottom: '', color: '#2a2a2a' };
TILE_LABELS['winds-South'] = { top: '南', bottom: '', color: '#2a2a2a' };
TILE_LABELS['winds-West'] = { top: '西', bottom: '', color: '#2a2a2a' };
TILE_LABELS['winds-North'] = { top: '北', bottom: '', color: '#2a2a2a' };
TILE_LABELS['dragons-Red'] = { top: '中', bottom: '', color: '#b33a2a' };
TILE_LABELS['dragons-Green'] = { top: '發', bottom: '', color: '#2a6a3a' };
TILE_LABELS['dragons-White'] = { top: '白', bottom: '', color: '#6a6a7a' };

function getTileKey(tile) {
  if (tile.num !== undefined) return `${tile.suit}-${tile.num}`;
  if (tile.wind) return `winds-${tile.wind}`;
  if (tile.dragon) return `dragons-${tile.dragon}`;
  if (tile.flower) return `flower-${tile.flower}`;
  if (tile.season) return `season-${tile.season}`;
  return 'unknown';
}

function getTileDisplay(tile) {
  const key = getTileKey(tile);
  return TILE_UNICODE[key] || '🀫';
}

function getTileLabel(tile) {
  const key = getTileKey(tile);
  if (TILE_LABELS[key]) return TILE_LABELS[key];
  if (tile.flower) return { top: ['梅','蘭','菊','竹'][['Plum','Orchid','Chrysanthemum','Bamboo'].indexOf(tile.flower)] || '花', bottom: '', color: '#8a3a5a' };
  if (tile.season) return { top: ['春','夏','秋','冬'][['Spring','Summer','Autumn','Winter'].indexOf(tile.season)] || '季', bottom: '', color: '#5a6a3a' };
  return { top: '?', bottom: '', color: '#888' };
}

// ==================== GAME STATE CLASS ====================
const WINDS = ['East', 'South', 'West', 'North'];
const WIND_CHARS = { East: '東', South: '南', West: '西', North: '北' };
const DRAGONS = ['Red', 'Green', 'White'];
const FLOWERS = ['Plum', 'Orchid', 'Chrysanthemum', 'Bamboo'];
const SEASONS = ['Spring', 'Summer', 'Autumn', 'Winter'];
const PLAYER_NAMES = { 0: 'Usagi', 1: 'You', 2: 'Kitsune', 3: 'Mochi' };
const PLAYER_EMOJIS = { 0: '🐰', 1: '🐼', 2: '🦊', 3: '🐱' };
const SEAT_MAP = { 0: 'east', 1: 'south', 2: 'west', 3: 'north' };

class GameState {
  constructor() {
    this.reset();
  }

  reset() {
    this.wall = [];
    this.deadWall = [];
    this.players = [
      { seat: 'east', hand: [], melds: [], flowers: [], discards: [], score: 25000, isAI: true },
      { seat: 'south', hand: [], melds: [], flowers: [], discards: [], score: 25000, isAI: false },
      { seat: 'west', hand: [], melds: [], flowers: [], discards: [], score: 25000, isAI: true },
      { seat: 'north', hand: [], melds: [], flowers: [], discards: [], score: 25000, isAI: true }
    ];
    this.currentPlayer = 0;
    this.dealerSeat = 0;
    this.roundWind = 'East';
    this.lastDiscard = null;
    this.lastDiscardPlayer = -1;
    this.drawnTile = null;
    this.phase = 'waiting'; // waiting, discard, claiming, ended
    this.claimWindow = false;
    this.possibleClaims = [];
    this.selectedTileIndex = -1;
    this.claimTimeoutId = null;
    this.justClaimed = false;
    this.kongInProgress = false;
    this.pendingKongTile = null;
    this.winType = null;
  }

  createTileSet() {
    const tiles = [];
    let id = 0;
    for (const suit of ['bamboo', 'dots', 'characters']) {
      for (let num = 1; num <= 9; num++) {
        for (let i = 0; i < 4; i++) {
          tiles.push({ id: id++, suit, num, type: 'suited' });
        }
      }
    }
    for (const wind of WINDS) {
      for (let i = 0; i < 4; i++) {
        tiles.push({ id: id++, suit: 'winds', wind, type: 'honor' });
      }
    }
    for (const dragon of DRAGONS) {
      for (let i = 0; i < 4; i++) {
        tiles.push({ id: id++, suit: 'dragons', dragon, type: 'honor' });
      }
    }
    for (const flower of FLOWERS) {
      tiles.push({ id: id++, suit: 'flowers', flower, type: 'bonus' });
    }
    for (const season of SEASONS) {
      tiles.push({ id: id++, suit: 'flowers', season, type: 'bonus' });
    }
    return tiles;
  }

  shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  getTileSortKey(tile) {
    const suitOrder = { bamboo: 0, dots: 1, characters: 2, winds: 3, dragons: 4, flowers: 5 };
    let key = (suitOrder[tile.suit] || 0) * 100;
    if (tile.num) key += tile.num;
    if (tile.wind) key += WINDS.indexOf(tile.wind);
    if (tile.dragon) key += DRAGONS.indexOf(tile.dragon);
    if (tile.flower) key += FLOWERS.indexOf(tile.flower);
    if (tile.season) key += SEASONS.indexOf(tile.season) + 4;
    return key;
  }

  sortHand(hand) {
    return hand.sort((a, b) => this.getTileSortKey(a) - this.getTileSortKey(b));
  }

  tilesMatch(a, b) {
    if (a.suit !== b.suit) return false;
    if (a.num !== undefined) return a.num === b.num;
    if (a.wind) return a.wind === b.wind;
    if (a.dragon) return a.dragon === b.dragon;
    return false;
  }

  countMatching(hand, tile) {
    return hand.filter(t => this.tilesMatch(t, tile)).length;
  }

  dealTiles() {
    const allTiles = this.shuffle(this.createTileSet());
    this.deadWall = allTiles.splice(-14);
    this.wall = allTiles;

    for (let round = 0; round < 3; round++) {
      for (let p = 0; p < 4; p++) {
        for (let i = 0; i < 4; i++) this.drawTileToHand(p);
      }
    }
    for (let p = 0; p < 4; p++) this.drawTileToHand(p);
    this.drawTileToHand(this.dealerSeat);

    for (const p of this.players) this.sortHand(p.hand);
    for (let p = 0; p < 4; p++) this.handleFlowers(p);
  }

  drawTileToHand(pi) {
    if (this.wall.length === 0) return null;
    const tile = this.wall.shift();
    this.players[pi].hand.push(tile);
    return tile;
  }

  drawReplacementTile(pi) {
    let tile;
    if (this.deadWall.length > 0) tile = this.deadWall.shift();
    else if (this.wall.length > 0) tile = this.wall.pop();
    else return null;
    this.players[pi].hand.push(tile);
    return tile;
  }

  handleFlowers(pi) {
    const player = this.players[pi];
    let hadFlowers = false;
    while (true) {
      const fi = player.hand.findIndex(t => t.type === 'bonus');
      if (fi === -1) break;
      const flower = player.hand.splice(fi, 1)[0];
      player.flowers.push(flower);
      hadFlowers = true;
      if (!this.drawReplacementTile(pi)) break;
    }
    if (hadFlowers) this.sortHand(player.hand);
    return hadFlowers;
  }

  // ========== Winning logic ==========
  canMahjong(pi, tile = null) {
    const player = this.players[pi];
    const hand = [...player.hand];
    if (tile) hand.push(tile);
    const setsNeeded = 4 - player.melds.length;
    return this.checkWinningHand(hand, setsNeeded);
  }

  checkWinningHand(hand, setsNeeded = 4) {
    const expected = setsNeeded * 3 + 2;
    if (hand.length !== expected) return false;
    const sorted = [...hand].sort((a, b) => this.getTileSortKey(a) - this.getTileSortKey(b));
    for (let i = 0; i < sorted.length - 1; i++) {
      if (this.tilesMatch(sorted[i], sorted[i + 1])) {
        if (i > 0 && this.tilesMatch(sorted[i], sorted[i - 1])) continue;
        const remaining = [...sorted];
        remaining.splice(i, 2);
        if (this.canFormSets(remaining, setsNeeded)) return true;
      }
    }
    return false;
  }

  canFormSets(tiles, numSets) {
    if (tiles.length === 0) return numSets === 0;
    if (tiles.length !== numSets * 3) return false;
    const sorted = [...tiles].sort((a, b) => this.getTileSortKey(a) - this.getTileSortKey(b));

    // Try pung
    if (sorted.length >= 3 && this.tilesMatch(sorted[0], sorted[1]) && this.tilesMatch(sorted[1], sorted[2])) {
      if (this.canFormSets(sorted.slice(3), numSets - 1)) return true;
    }
    // Try chi
    if (sorted[0].type === 'suited' && sorted.length >= 3) {
      const t1 = sorted[0];
      const t2i = sorted.findIndex((t, i) => i > 0 && t.suit === t1.suit && t.num === t1.num + 1);
      const t3i = sorted.findIndex((t, i) => i > 0 && t.suit === t1.suit && t.num === t1.num + 2);
      if (t2i > 0 && t3i > 0) {
        const remaining = [...sorted];
        for (const idx of [0, t2i, t3i].sort((a, b) => b - a)) remaining.splice(idx, 1);
        if (this.canFormSets(remaining, numSets - 1)) return true;
      }
    }
    return false;
  }

  // ========== Claiming ==========
  getChiCombinations(pi, tile) {
    if (tile.type !== 'suited') return [];
    const leftPlayer = (pi + 3) % 4;
    if (this.lastDiscardPlayer !== leftPlayer) return [];
    const hand = this.players[pi].hand;
    const suit = tile.suit, num = tile.num;
    const combos = [];
    const hasN = (n) => hand.some(t => t.suit === suit && t.num === n);
    const findT = (n) => hand.find(t => t.suit === suit && t.num === n);

    if (num >= 3 && hasN(num - 2) && hasN(num - 1))
      combos.push({ type: 'chi', tiles: [findT(num - 2), findT(num - 1), tile] });
    if (num >= 2 && num <= 8 && hasN(num - 1) && hasN(num + 1))
      combos.push({ type: 'chi', tiles: [findT(num - 1), tile, findT(num + 1)] });
    if (num <= 7 && hasN(num + 1) && hasN(num + 2))
      combos.push({ type: 'chi', tiles: [tile, findT(num + 1), findT(num + 2)] });
    return combos;
  }

  canChi(pi, tile) { return this.getChiCombinations(pi, tile).length > 0; }

  canPong(pi, tile) {
    if (this.lastDiscardPlayer === pi) return false;
    return this.countMatching(this.players[pi].hand, tile) >= 2;
  }

  canKong(pi, tile) {
    if (this.lastDiscardPlayer === pi) return false;
    return this.countMatching(this.players[pi].hand, tile) >= 3;
  }

  getConcealedKongs(pi) {
    const hand = this.players[pi].hand;
    const counts = {};
    const kongs = [];
    for (const tile of hand) {
      const key = getTileKey(tile);
      counts[key] = (counts[key] || 0) + 1;
      if (counts[key] === 4) kongs.push({ tile, key });
    }
    return kongs;
  }

  getAddKongs(pi) {
    const player = this.players[pi];
    const addKongs = [];
    for (const meld of player.melds) {
      if (meld.type === 'pong') {
        const match = player.hand.find(t => this.tilesMatch(t, meld.tiles[0]));
        if (match) addKongs.push({ meld, tile: match });
      }
    }
    return addKongs;
  }

  // ========== AI ==========
  evaluateTileValue(hand, tile) {
    const matchCount = this.countMatching(hand, tile);
    let value = 0;
    if (matchCount >= 3) value += 50;
    else if (matchCount >= 2) value += 30;
    else if (matchCount === 1) value += 5;

    if (tile.type === 'suited') {
      const { num, suit } = tile;
      const hasN = (n) => n >= 1 && n <= 9 && hand.some(t => t.suit === suit && t.num === n);
      if (hasN(num - 1)) value += 15;
      if (hasN(num + 1)) value += 15;
      if (hasN(num - 2)) value += 8;
      if (hasN(num + 2)) value += 8;
      if (num >= 4 && num <= 6) value += 5;
      if (num === 1 || num === 9) value -= 3;
    }
    if (tile.type === 'honor' && matchCount === 1) value -= 5;
    return value;
  }

  aiChooseDiscard(pi) {
    const hand = this.players[pi].hand;
    if (hand.length === 0) return -1;
    const evals = hand.map((tile, index) => ({ index, value: this.evaluateTileValue(hand, tile) }));
    evals.sort((a, b) => a.value - b.value);
    const cands = evals.slice(0, Math.min(3, evals.length));
    return cands[Math.floor(Math.random() * cands.length)].index;
  }
}

// ==================== THREE.JS RENDERER ====================
class Renderer {
  constructor() {
    this.scene = new THREE.Scene();
    this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    this.renderer = new THREE.WebGLRenderer({
      canvas: document.getElementById('game-canvas'),
      antialias: true,
      alpha: false
    });
    this.renderer.setSize(window.innerWidth, window.innerHeight);
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    this.renderer.shadowMap.enabled = true;
    this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
    this.renderer.toneMappingExposure = 1.45;

    // Camera setup - strong isometric view (~35° from horizontal), pulled back for breathing room
    this.camera.position.set(0, 12, 12);
    this.camera.lookAt(0, 0, -1);

    this.tileTextures = {};
    this.tileMeshes = [];
    this.discardMeshes = [];
    this.wallMeshes = [];
    this.animating = false;

    this.setupScene();
    this.animate();

    window.addEventListener('resize', () => this.onResize());
  }

  setupScene() {
    // Background - warm aged parchment with ink wash sky
    this.createBackgroundSky();
    this.scene.fog = new THREE.Fog(0xf2e4c8, 22, 45);

    // Warm ambient light - lantern glow feel (~3500K)
    const ambient = new THREE.AmbientLight(0xffe8cc, 0.75);
    this.scene.add(ambient);

    // Hemisphere light for natural sky/ground bounce
    const hemiLight = new THREE.HemisphereLight(0xfff0d8, 0xe8d8c0, 0.35);
    this.scene.add(hemiLight);

    // Main directional light — warm, from above-front like a lantern
    const dirLight = new THREE.DirectionalLight(0xffeedd, 1.1);
    dirLight.position.set(2, 9, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 25;
    dirLight.shadow.camera.left = -7;
    dirLight.shadow.camera.right = 7;
    dirLight.shadow.camera.top = 7;
    dirLight.shadow.camera.bottom = -7;
    dirLight.shadow.bias = -0.0005;
    dirLight.shadow.normalBias = 0.02;
    dirLight.shadow.radius = 3;
    this.scene.add(dirLight);

    // Warm fill light from opposite side
    const fillLight = new THREE.DirectionalLight(0xfce4c8, 0.25);
    fillLight.position.set(-4, 6, -3);
    this.scene.add(fillLight);

    // Subtle warm rim light from behind
    const rimLight = new THREE.DirectionalLight(0xffd8a8, 0.15);
    rimLight.position.set(0, 3, -6);
    this.scene.add(rimLight);

    // Table surface
    this.createTable();

    // Ink wash decorations on table
    this.createInkDecorations();

    // Wind direction indicator tiles in center
    this.createWindIndicators();
  }

  createBackgroundSky() {
    // Procedural background: aged parchment gradient with faint ink wash mountains
    const canvas = document.createElement('canvas');
    canvas.width = 1024;
    canvas.height = 1024;
    const ctx = canvas.getContext('2d');

    // Base parchment gradient — warm and aged
    const bgGrad = ctx.createLinearGradient(0, 0, 0, 1024);
    bgGrad.addColorStop(0, '#eedcc0');
    bgGrad.addColorStop(0.15, '#f0e2c8');
    bgGrad.addColorStop(0.4, '#f2e8d4');
    bgGrad.addColorStop(0.7, '#f0e2c8');
    bgGrad.addColorStop(1, '#eedcc0');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, 1024, 1024);

    // Rice paper grain texture
    for (let i = 0; i < 20000; i++) {
      const x = Math.random() * 1024;
      const y = Math.random() * 1024;
      const alpha = Math.random() * 0.04;
      ctx.fillStyle = `rgba(120,100,70,${alpha})`;
      ctx.fillRect(x, y, Math.random() * 2 + 0.5, Math.random() * 2 + 0.5);
    }

    // Faint ink wash mountain silhouettes at top
    ctx.save();
    ctx.globalAlpha = 0.14;

    // Far mountains
    ctx.fillStyle = '#4a4038';
    ctx.beginPath();
    ctx.moveTo(0, 280);
    ctx.bezierCurveTo(100, 180, 250, 140, 380, 200);
    ctx.bezierCurveTo(450, 160, 550, 100, 700, 170);
    ctx.bezierCurveTo(800, 120, 900, 150, 1024, 220);
    ctx.lineTo(1024, 400);
    ctx.lineTo(0, 400);
    ctx.closePath();
    ctx.fill();

    // Near mountains — slightly darker
    ctx.globalAlpha = 0.09;
    ctx.fillStyle = '#3a3028';
    ctx.beginPath();
    ctx.moveTo(0, 340);
    ctx.bezierCurveTo(150, 250, 300, 220, 450, 280);
    ctx.bezierCurveTo(550, 230, 700, 200, 850, 260);
    ctx.bezierCurveTo(950, 240, 1000, 270, 1024, 300);
    ctx.lineTo(1024, 420);
    ctx.lineTo(0, 420);
    ctx.closePath();
    ctx.fill();

    // Subtle cloud wisps
    ctx.globalAlpha = 0.07;
    ctx.strokeStyle = '#6a5a48';
    ctx.lineWidth = 2;
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      const y = 160 + i * 40 + Math.random() * 30;
      const x1 = Math.random() * 300;
      ctx.moveTo(x1, y);
      ctx.bezierCurveTo(x1 + 100, y - 15, x1 + 200, y + 10, x1 + 350, y - 5);
      ctx.stroke();
    }

    ctx.restore();

    const texture = new THREE.CanvasTexture(canvas);
    this.scene.background = texture;
  }

  createTable() {
    // Procedural green felt texture for table surface
    const texCanvas = document.createElement('canvas');
    texCanvas.width = 1024;
    texCanvas.height = 1024;
    const tctx = texCanvas.getContext('2d');

    // Base dark green felt
    const baseGrad = tctx.createRadialGradient(512, 512, 0, 512, 512, 600);
    baseGrad.addColorStop(0, '#1a5c2e');
    baseGrad.addColorStop(0.6, '#165028');
    baseGrad.addColorStop(1, '#124420');
    tctx.fillStyle = baseGrad;
    tctx.fillRect(0, 0, 1024, 1024);

    // Felt fiber grain — horizontal
    for (let i = 0; i < 30000; i++) {
      const x = Math.random() * 1024;
      const y = Math.random() * 1024;
      const w = Math.random() * 6 + 1;
      const h = Math.random() * 1.5 + 0.3;
      const alpha = Math.random() * 0.035 + 0.005;
      tctx.fillStyle = `rgba(40,120,60,${alpha})`;
      tctx.fillRect(x, y, w, h);
    }

    // Vertical fibers (fewer)
    for (let i = 0; i < 8000; i++) {
      const x = Math.random() * 1024;
      const y = Math.random() * 1024;
      const w = Math.random() * 1 + 0.3;
      const h = Math.random() * 5 + 1;
      const alpha = Math.random() * 0.025;
      tctx.fillStyle = `rgba(30,100,50,${alpha})`;
      tctx.fillRect(x, y, w, h);
    }

    // Subtle felt texture variation
    for (let i = 0; i < 8; i++) {
      const x = Math.random() * 1024;
      const y = Math.random() * 1024;
      const r = Math.random() * 80 + 30;
      const sGrad = tctx.createRadialGradient(x, y, 0, x, y, r);
      sGrad.addColorStop(0, `rgba(20,80,35,${Math.random() * 0.03})`);
      sGrad.addColorStop(1, 'rgba(20,80,35,0)');
      tctx.fillStyle = sGrad;
      tctx.fillRect(x - r, y - r, r * 2, r * 2);
    }

    const tableTexture = new THREE.CanvasTexture(texCanvas);
    tableTexture.wrapS = THREE.RepeatWrapping;
    tableTexture.wrapT = THREE.RepeatWrapping;

    // Main table surface
    const tableGeo = new THREE.BoxGeometry(14, 0.15, 14);
    const tableMat = new THREE.MeshStandardMaterial({
      map: tableTexture,
      color: 0xffffff,
      roughness: 0.88,
      metalness: 0.0,
    });
    const table = new THREE.Mesh(tableGeo, tableMat);
    table.position.y = -0.075;
    table.receiveShadow = true;
    this.scene.add(table);

    // Table border/frame — procedural wood grain texture
    const woodCanvas = document.createElement('canvas');
    woodCanvas.width = 512;
    woodCanvas.height = 512;
    const wctx = woodCanvas.getContext('2d');

    // Base walnut color
    wctx.fillStyle = '#3a2818';
    wctx.fillRect(0, 0, 512, 512);

    // Horizontal grain lines with varying browns
    const grainColors = ['#3a2818', '#4a3320', '#2a1a10', '#352315', '#3f2c1c'];
    for (let i = 0; i < 600; i++) {
      const y = Math.random() * 512;
      const w = 512;
      const h = Math.random() * 2 + 0.5;
      const alpha = Math.random() * 0.4 + 0.1;
      wctx.fillStyle = grainColors[Math.floor(Math.random() * grainColors.length)];
      wctx.globalAlpha = alpha;
      wctx.fillRect(0, y, w, h);
    }
    wctx.globalAlpha = 1.0;

    // Wavy grain lines for realism
    for (let i = 0; i < 40; i++) {
      const baseY = Math.random() * 512;
      wctx.beginPath();
      wctx.moveTo(0, baseY);
      for (let x = 0; x < 512; x += 4) {
        const yOff = Math.sin(x * 0.02 + i) * 3 + Math.sin(x * 0.005 + i * 0.7) * 6;
        wctx.lineTo(x, baseY + yOff);
      }
      wctx.strokeStyle = `rgba(${30 + Math.random() * 30},${15 + Math.random() * 20},${5 + Math.random() * 10},${Math.random() * 0.15 + 0.05})`;
      wctx.lineWidth = Math.random() * 1.5 + 0.5;
      wctx.stroke();
    }

    // Knot-like darker oval spots
    for (let i = 0; i < 5; i++) {
      const kx = Math.random() * 512;
      const ky = Math.random() * 512;
      const rx = Math.random() * 15 + 8;
      const ry = Math.random() * 10 + 5;
      wctx.save();
      wctx.translate(kx, ky);
      wctx.rotate(Math.random() * 0.3);
      wctx.beginPath();
      wctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
      const kGrad = wctx.createRadialGradient(0, 0, 0, 0, 0, rx);
      kGrad.addColorStop(0, 'rgba(20,10,3,0.35)');
      kGrad.addColorStop(0.6, 'rgba(25,14,5,0.15)');
      kGrad.addColorStop(1, 'rgba(30,18,8,0)');
      wctx.fillStyle = kGrad;
      wctx.fill();
      wctx.restore();
    }

    const woodTexture = new THREE.CanvasTexture(woodCanvas);
    woodTexture.wrapS = THREE.RepeatWrapping;
    woodTexture.wrapT = THREE.RepeatWrapping;

    const borderGeo = new THREE.BoxGeometry(15.0, 0.35, 15.0);
    const borderMat = new THREE.MeshStandardMaterial({
      map: woodTexture,
      color: 0xffffff,
      roughness: 0.55,
      metalness: 0.15,
    });
    const border = new THREE.Mesh(borderGeo, borderMat);
    border.position.y = -0.20;
    border.receiveShadow = true;
    this.scene.add(border);

    // Decorative brass corner brackets
    const brassMat = new THREE.MeshStandardMaterial({
      color: 0xb8860b,
      metalness: 0.6,
      roughness: 0.4,
    });
    const corners = [
      { x: -7.2, z: -7.2, rot: 0 },
      { x:  7.2, z: -7.2, rot: Math.PI * 0.5 },
      { x:  7.2, z:  7.2, rot: Math.PI },
      { x: -7.2, z:  7.2, rot: Math.PI * 1.5 },
    ];
    for (const c of corners) {
      const bracket = new THREE.Group();
      const armH = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.08, 0.15), brassMat);
      armH.position.set(0.75, 0, 0);
      bracket.add(armH);
      const armV = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.08, 1.5), brassMat);
      armV.position.set(0, 0, 0.75);
      bracket.add(armV);
      // Small corner square where arms meet
      const corner = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.08, 0.25), brassMat);
      corner.position.set(0, 0, 0);
      bracket.add(corner);
      bracket.position.set(c.x, -0.02, c.z);
      bracket.rotation.y = c.rot;
      this.scene.add(bracket);
    }

    // Inner playing area — slightly lighter felt overlay
    const innerGeo = new THREE.PlaneGeometry(10.5, 10.5);
    const innerMat = new THREE.MeshStandardMaterial({
      color: 0x1e6b35,
      roughness: 0.92,
      metalness: 0.0,
      transparent: true,
      opacity: 0.18,
    });
    const inner = new THREE.Mesh(innerGeo, innerMat);
    inner.rotation.x = -Math.PI / 2;
    inner.position.y = 0.002;
    inner.receiveShadow = true;
    this.scene.add(inner);

    // Thin decorative border lines on playing area (ink brush feel)
    const lineCanvas = document.createElement('canvas');
    lineCanvas.width = 512;
    lineCanvas.height = 512;
    const lctx = lineCanvas.getContext('2d');
    lctx.clearRect(0, 0, 512, 512);
    lctx.strokeStyle = 'rgba(200,180,100,0.18)';
    lctx.lineWidth = 2;
    lctx.strokeRect(20, 20, 472, 472);
    lctx.strokeStyle = 'rgba(200,180,100,0.12)';
    lctx.lineWidth = 1;
    lctx.strokeRect(30, 30, 452, 452);
    const lineTexture = new THREE.CanvasTexture(lineCanvas);
    const lineGeo = new THREE.PlaneGeometry(11, 11);
    const lineMat = new THREE.MeshStandardMaterial({
      map: lineTexture,
      transparent: true,
      roughness: 1,
      metalness: 0,
    });
    const lineOverlay = new THREE.Mesh(lineGeo, lineMat);
    lineOverlay.rotation.x = -Math.PI / 2;
    lineOverlay.position.y = 0.004;
    this.scene.add(lineOverlay);
  }

  createInkDecorations() {
    const canvas = document.createElement('canvas');
    canvas.width = 1024;
    canvas.height = 1024;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, 1024, 1024);

    // === Bold Ens\u014d circle ink brush stroke ===
    ctx.save();
    ctx.translate(512, 512);
    const ensoR = 180, nSteps = 200, gapA = 0.4;
    for (let pass = 0; pass < 3; pass++) {
      ctx.beginPath();
      const alpha = [0.40, 0.25, 0.15][pass];
      const lw = [12, 18, 24][pass];
      for (let i = 0; i < nSteps; i++) {
        const t = i / nSteps;
        const ang = gapA + t * (Math.PI * 2 - gapA * 2);
        const wobble = Math.sin(t * 17) * 1.5 + Math.cos(t * 23) * 1;
        const r = ensoR + pass * 2 + wobble;
        const x = Math.cos(ang) * r, y = Math.sin(ang) * r;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.strokeStyle = 'rgba(60,45,30,' + alpha + ')';
      ctx.lineWidth = lw;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.stroke();
    }
    for (let i = 0; i < 8; i++) {
      const ang = gapA + Math.random() * 0.3;
      const r = ensoR + (Math.random() - 0.5) * 30;
      ctx.beginPath();
      ctx.arc(Math.cos(ang) * r, Math.sin(ang) * r, Math.random() * 3 + 1, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(60,45,30,' + (Math.random() * 0.2 + 0.1) + ')';
      ctx.fill();
    }
    ctx.restore();

    // Corner bamboo motif — top-left
    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.strokeStyle = '#3a5a3a';
    ctx.lineWidth = 3;
    // Bamboo stalks
    for (let i = 0; i < 3; i++) {
      const bx = 70 + i * 28;
      ctx.beginPath(); ctx.moveTo(bx, 20); ctx.lineTo(bx + 4, 220); ctx.stroke();
      // Node lines
      for (let n = 0; n < 4; n++) {
        const ny = 50 + n * 45;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(bx - 5, ny); ctx.lineTo(bx + 9, ny); ctx.stroke();
        ctx.lineWidth = 3;
      }
    }
    // Bamboo leaves — sweeping strokes
    ctx.lineWidth = 2.5;
    ctx.fillStyle = '#3a5a3a';
    const drawLeaf = (x, y, angle, len) => {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(len * 0.3, -len * 0.15, len * 0.7, -len * 0.12, len, 0);
      ctx.bezierCurveTo(len * 0.7, len * 0.12, len * 0.3, len * 0.15, 0, 0);
      ctx.fill();
      ctx.restore();
    };
    drawLeaf(100, 70, -0.5, 50);
    drawLeaf(95, 90, -0.8, 40);
    drawLeaf(75, 110, -2.4, 45);
    drawLeaf(70, 130, -2.6, 35);
    drawLeaf(110, 55, -0.3, 55);
    drawLeaf(130, 60, 0.2, 40);
    ctx.restore();

    // Corner bamboo motif — bottom-right
    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.strokeStyle = '#3a5a3a';
    ctx.fillStyle = '#3a5a3a';
    ctx.lineWidth = 3;
    for (let i = 0; i < 2; i++) {
      const bx = 890 + i * 28;
      ctx.beginPath(); ctx.moveTo(bx, 800); ctx.lineTo(bx + 3, 1000); ctx.stroke();
      for (let n = 0; n < 3; n++) {
        const ny = 830 + n * 50;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(bx - 5, ny); ctx.lineTo(bx + 8, ny); ctx.stroke();
        ctx.lineWidth = 3;
      }
    }
    drawLeaf(910, 860, -0.4, 50);
    drawLeaf(905, 880, -0.7, 40);
    drawLeaf(890, 900, -2.5, 45);
    drawLeaf(920, 845, 0.2, 40);
    ctx.restore();

    // Vermillion seal stamp
    ctx.save();
    ctx.translate(920, 100);
    ctx.fillStyle = 'rgba(179,58,42,0.18)';
    ctx.fillRect(-22, -22, 44, 44);
    ctx.strokeStyle = 'rgba(179,58,42,0.25)';
    ctx.lineWidth = 2;
    ctx.strokeRect(-20, -20, 40, 40);
    ctx.fillStyle = 'rgba(179,58,42,0.22)';
    ctx.font = 'bold 22px "Ma Shan Zheng", serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('\u96C0', 0, 0);
    ctx.restore();

    // Ink wash cloud wisps in corners
    ctx.save();
    ctx.globalAlpha = 0.12;
    ctx.strokeStyle = '#5a4a38';
    ctx.lineWidth = 2;
    // Bottom-left cloud
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      const y = 870 + i * 20;
      ctx.moveTo(40, y);
      ctx.bezierCurveTo(80, y - 15, 130, y + 10, 180, y - 5);
      ctx.stroke();
    }
    // Top-right cloud
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      const y = 100 + i * 20;
      ctx.moveTo(820, y);
      ctx.bezierCurveTo(860, y - 15, 910, y + 10, 960, y - 5);
      ctx.stroke();
    }
    ctx.restore();

    const texture = new THREE.CanvasTexture(canvas);
    const decoGeo = new THREE.PlaneGeometry(10, 10);
    const decoMat = new THREE.MeshStandardMaterial({
      map: texture, transparent: true, roughness: 1, metalness: 0, depthWrite: false,
    });
    const deco = new THREE.Mesh(decoGeo, decoMat);
    deco.rotation.x = -Math.PI / 2;
    deco.position.y = 0.005;
    this.scene.add(deco);
  }

  createWindIndicators() {
    // Wind tiles in a diamond pattern in the center of the table
    const winds = [
      { char: '東', color: '#2a2018', x: 0.55, z: 0 },     // East - right
      { char: '南', color: '#2a2018', x: 0, z: 0.55 },      // South - bottom
      { char: '西', color: '#2a2018', x: -0.55, z: 0 },     // West - left
      { char: '北', color: '#2a2018', x: 0, z: -0.55 },     // North - top
    ];

    for (const w of winds) {
      const tile = { suit: 'winds', wind: w.char === '東' ? 'East' : w.char === '南' ? 'South' : w.char === '西' ? 'West' : 'North' };
      const mesh = this.create3DTile(tile, false);
      mesh.position.set(w.x * 1.3, 0.15, w.z * 1.3);
      mesh.scale.set(0.975, 0.975, 0.975);
      this.scene.add(mesh);

      // Subtle glow beneath each wind tile
      const glowGeo = new THREE.PlaneGeometry(0.6, 0.6);
      const glowMat = new THREE.MeshBasicMaterial({
        color: 0xffd8a0, transparent: true, opacity: 0.18, depthWrite: false,
      });
      const glow = new THREE.Mesh(glowGeo, glowMat);
      glow.rotation.x = -Math.PI / 2;
      glow.position.set(w.x * 1.3, 0.005, w.z * 1.3);
      this.scene.add(glow);
    }
  }

  createTileTexture(tile) {
    const key = getTileKey(tile);
    if (this.tileTextures[key]) return this.tileTextures[key];

    // Higher resolution for crisp characters
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 352;
    const ctx = canvas.getContext('2d');

    // Tile face — clean white with subtle warm gradient
    const faceGrad = ctx.createLinearGradient(0, 0, 0, 352);
    faceGrad.addColorStop(0, '#fafaf5');
    faceGrad.addColorStop(0.5, '#fafaf5');
    faceGrad.addColorStop(1, '#f5f0e8');
    ctx.fillStyle = faceGrad;
    ctx.fillRect(0, 0, 256, 352);

    // Subtle warm edge tint
    const edgeGrad = ctx.createLinearGradient(0, 0, 256, 0);
    edgeGrad.addColorStop(0, 'rgba(220,200,170,0.15)');
    edgeGrad.addColorStop(0.1, 'rgba(220,200,170,0)');
    edgeGrad.addColorStop(0.9, 'rgba(220,200,170,0)');
    edgeGrad.addColorStop(1, 'rgba(220,200,170,0.15)');
    ctx.fillStyle = edgeGrad;
    ctx.fillRect(0, 0, 256, 352);

    // Fine border
    ctx.strokeStyle = 'rgba(160,140,110,0.25)';
    ctx.lineWidth = 3;
    ctx.strokeRect(2, 2, 252, 348);

    if (key.startsWith('dots-')) {
      // Draw actual circles for dots tiles instead of text
      const dotNum = parseInt(key.split('-')[1]);
      const layouts = {
        1: { r: 42, pos: [[128, 176]] },
        2: { r: 30, pos: [[128, 116], [128, 236]] },
        3: { r: 26, pos: [[172, 96], [128, 176], [84, 256]] },
        4: { r: 26, pos: [[88, 116], [168, 116], [88, 236], [168, 236]] },
        5: { r: 24, pos: [[84, 108], [172, 108], [128, 176], [84, 244], [172, 244]] },
        6: { r: 22, pos: [[88, 96], [168, 96], [88, 176], [168, 176], [88, 256], [168, 256]] },
        7: { r: 20, pos: [[128, 82], [84, 168], [128, 168], [172, 168], [84, 260], [128, 260], [172, 260]] },
        8: { r: 20, pos: [[80, 96], [128, 96], [176, 96], [104, 176], [152, 176], [80, 256], [128, 256], [176, 256]] },
        9: { r: 20, pos: [[80, 96], [128, 96], [176, 96], [80, 176], [128, 176], [176, 176], [80, 256], [128, 256], [176, 256]] },
      };
      const layout = layouts[dotNum];
      if (layout) {
        const { r, pos } = layout;
        if (dotNum === 1) {
          // Ornate 1-dot: elaborate multi-ring concentric design
          const cx = 128, cy = 176, R = 56;

          // Outermost ring - deep teal
          ctx.beginPath();
          ctx.arc(cx, cy, R, 0, Math.PI * 2);
          ctx.fillStyle = '#1a5a6a';
          ctx.fill();
          ctx.strokeStyle = '#0e3e4e';
          ctx.lineWidth = 3;
          ctx.stroke();

          // Decorative ray pattern between rings
          ctx.save();
          ctx.translate(cx, cy);
          for (let i = 0; i < 16; i++) {
            const angle = (i / 16) * Math.PI * 2;
            ctx.beginPath();
            ctx.moveTo(Math.cos(angle) * R * 0.65, Math.sin(angle) * R * 0.65);
            ctx.lineTo(Math.cos(angle) * R * 0.88, Math.sin(angle) * R * 0.88);
            ctx.strokeStyle = '#5ababa';
            ctx.lineWidth = 2;
            ctx.stroke();
          }
          ctx.restore();

          // Second ring
          ctx.beginPath();
          ctx.arc(cx, cy, R * 0.72, 0, Math.PI * 2);
          ctx.strokeStyle = '#3a9aaa';
          ctx.lineWidth = 2.5;
          ctx.stroke();

          // Middle filled band
          ctx.beginPath();
          ctx.arc(cx, cy, R * 0.6, 0, Math.PI * 2);
          ctx.fillStyle = '#2a7a8a';
          ctx.fill();
          ctx.strokeStyle = '#1a5a6a';
          ctx.lineWidth = 2;
          ctx.stroke();

          // Third concentric ring
          ctx.beginPath();
          ctx.arc(cx, cy, R * 0.45, 0, Math.PI * 2);
          ctx.strokeStyle = '#4abaca';
          ctx.lineWidth = 2;
          ctx.stroke();

          // Inner decorative dots around center
          for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            ctx.beginPath();
            ctx.arc(
              cx + Math.cos(angle) * R * 0.33,
              cy + Math.sin(angle) * R * 0.33,
              2.5, 0, Math.PI * 2
            );
            ctx.fillStyle = '#6adaea';
            ctx.fill();
          }

          // Inner core
          ctx.beginPath();
          ctx.arc(cx, cy, R * 0.2, 0, Math.PI * 2);
          ctx.fillStyle = '#4abaca';
          ctx.fill();

          // Center highlight dot
          ctx.beginPath();
          ctx.arc(cx, cy, R * 0.08, 0, Math.PI * 2);
          ctx.fillStyle = '#8aeafa';
          ctx.fill();

          // Specular highlight for 3D feel
          ctx.beginPath();
          ctx.arc(cx - R * 0.18, cy - R * 0.2, R * 0.15, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255,255,255,0.12)';
          ctx.fill();
        } else {
          for (const [cx, cy] of pos) {
            // Outer filled circle
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fillStyle = '#3a8a7a';
            ctx.fill();
            ctx.strokeStyle = '#2a6a5a';
            ctx.lineWidth = r * 0.15;
            ctx.stroke();

            // Inner concentric ring
            ctx.beginPath();
            ctx.arc(cx, cy, r * 0.55, 0, Math.PI * 2);
            ctx.fillStyle = '#4a9a8a';
            ctx.fill();
            ctx.strokeStyle = '#2a6a5a';
            ctx.lineWidth = r * 0.1;
            ctx.stroke();

            // Subtle highlight for depth
            ctx.beginPath();
            ctx.arc(cx - r * 0.15, cy - r * 0.18, r * 0.22, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.fill();
          }
        }
      }
    } else if (key.startsWith('bamboo-')) {
      // Draw bamboo stick artwork
      const bambooNum = parseInt(key.split('-')[1]);

      if (bambooNum === 1) {
        // Traditional 1-bamboo is a stylized bird/sparrow
        ctx.save();
        ctx.translate(128, 176);
        // Body — green oval
        ctx.beginPath();
        ctx.ellipse(0, 0, 36, 28, -0.3, 0, Math.PI * 2);
        ctx.fillStyle = '#2a7a3a';
        ctx.fill();
        ctx.strokeStyle = '#1a5a2a';
        ctx.lineWidth = 2;
        ctx.stroke();
        // Head
        ctx.beginPath();
        ctx.arc(-30, -20, 16, 0, Math.PI * 2);
        ctx.fillStyle = '#2a7a3a';
        ctx.fill();
        ctx.stroke();
        // Red head detail / crest
        ctx.beginPath();
        ctx.arc(-32, -28, 8, 0, Math.PI * 2);
        ctx.fillStyle = '#c0392b';
        ctx.fill();
        // Eye
        ctx.beginPath();
        ctx.arc(-34, -18, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#1a1a1a';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(-34.5, -18.5, 1, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
        // Beak
        ctx.beginPath();
        ctx.moveTo(-46, -18);
        ctx.lineTo(-52, -16);
        ctx.lineTo(-46, -14);
        ctx.closePath();
        ctx.fillStyle = '#d4a017';
        ctx.fill();
        // Wing detail
        ctx.beginPath();
        ctx.ellipse(6, -4, 22, 14, -0.2, 0, Math.PI * 2);
        ctx.fillStyle = '#238b3a';
        ctx.fill();
        ctx.strokeStyle = '#1a5a2a';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Wing feather lines
        for (let i = 0; i < 4; i++) {
          ctx.beginPath();
          ctx.moveTo(-6 + i * 9, -12 + i * 2);
          ctx.quadraticCurveTo(4 + i * 8, 2, 14 + i * 6, 12);
          ctx.strokeStyle = '#1a5a2a';
          ctx.lineWidth = 1;
          ctx.stroke();
        }
        // Tail feathers
        ctx.beginPath();
        ctx.moveTo(30, -6);
        ctx.quadraticCurveTo(50, -20, 58, -34);
        ctx.strokeStyle = '#1a5a2a';
        ctx.lineWidth = 2.5;
        ctx.stroke();
        ctx.beginPath();
