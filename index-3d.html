            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(12, -8, 35, -7, 50, 0);
            ctx.bezierCurveTo(35, 7, 12, 8, 0, 0);
            ctx.fill();
            // Leaf vein
            ctx.strokeStyle = '#2a6a2a';
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            ctx.moveTo(2, 0);
            ctx.lineTo(45, 0);
            ctx.stroke();
            ctx.restore();
          }

          // Ground
          ctx.fillStyle = '#6aaa5a';
          ctx.beginPath();
          ctx.moveTo(0, 270);
          ctx.bezierCurveTo(80, 255, 176, 255, 256, 270);
          ctx.lineTo(256, 310);
          ctx.lineTo(0, 310);
          ctx.closePath();
          ctx.fill();

        } else if (seasonName === 'Autumn') {
          // Falling maple leaves in red/orange/gold
          const mapleLeaf = (cx, cy, size, rot, color) => {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(rot);
            ctx.scale(size, size);
            ctx.fillStyle = color;
            // Simplified maple leaf shape using triangular points
            ctx.beginPath();
            ctx.moveTo(0, -12);
            ctx.lineTo(-3, -4);
            ctx.lineTo(-10, -6);
            ctx.lineTo(-6, 0);
            ctx.lineTo(-11, 4);
            ctx.lineTo(-4, 3);
            ctx.lineTo(-2, 10);
            ctx.lineTo(0, 5);
            ctx.lineTo(2, 10);
            ctx.lineTo(4, 3);
            ctx.lineTo(11, 4);
            ctx.lineTo(6, 0);
            ctx.lineTo(10, -6);
            ctx.lineTo(3, -4);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = 'rgba(80,30,10,0.4)';
            ctx.lineWidth = 0.5;
            ctx.stroke();
            // Stem
            ctx.beginPath();
            ctx.moveTo(0, 5);
            ctx.lineTo(0, 14);
            ctx.strokeStyle = '#6a3a1a';
            ctx.lineWidth = 0.8;
            ctx.stroke();
            ctx.restore();
          };

          // Bare branch
          ctx.strokeStyle = '#5a3a1a';
          ctx.lineWidth = 4;
          ctx.lineCap = 'round';
          ctx.beginPath();
          ctx.moveTo(20, 260);
          ctx.bezierCurveTo(60, 200, 100, 160, 160, 120);
          ctx.stroke();
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.moveTo(110, 170);
          ctx.bezierCurveTo(80, 140, 60, 100, 50, 70);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(140, 135);
          ctx.bezierCurveTo(170, 100, 200, 80, 220, 60);
          ctx.stroke();

          // Scattered maple leaves
          const leaves = [
            [65, 80, 1.5, 0.3, '#c83020'], [55, 120, 1.0, 0.5, '#d86830'],
            [100, 100, 0.8, 0.35, '#e8a030'], [145, 110, 1.2, 0.4, '#c84020'],
            [200, 70, 0.6, 0.45, '#d87030'], [180, 130, 1.8, 0.35, '#b83020'],
            [80, 170, 2.0, 0.3, '#e8a030'], [160, 165, 0.4, 0.4, '#d86020'],
            [210, 150, 1.4, 0.3, '#c84830'], [120, 200, 2.5, 0.35, '#d88030'],
            [40, 200, 1.7, 0.25, '#e8a840'], [185, 200, 0.9, 0.3, '#c85030'],
            [75, 240, 2.2, 0.25, '#d87830'], [150, 240, 1.1, 0.3, '#b84020'],
            [220, 230, 0.5, 0.25, '#e89030'],
          ];
          for (const [lx, ly, rot, sz, col] of leaves) {
            mapleLeaf(lx, ly, sz, rot, col);
          }

        } else if (seasonName === 'Winter') {
          // Bare branches, snowflakes, cool blue-gray tones
          // Cool wash background
          const winterGrad = ctx.createLinearGradient(0, 40, 0, 310);
          winterGrad.addColorStop(0, 'rgba(180, 200, 220, 0.15)');
          winterGrad.addColorStop(1, 'rgba(200, 210, 225, 0.08)');
          ctx.fillStyle = winterGrad;
          ctx.fillRect(10, 40, 236, 270);

          // Bare dark branches
          ctx.strokeStyle = '#4a3a3a';
          ctx.lineWidth = 4;
          ctx.lineCap = 'round';
          ctx.beginPath();
          ctx.moveTo(60, 300);
          ctx.bezierCurveTo(70, 240, 90, 190, 120, 140);
          ctx.stroke();
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.moveTo(100, 190);
          ctx.bezierCurveTo(70, 160, 50, 120, 40, 80);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(115, 155);
          ctx.bezierCurveTo(140, 130, 170, 100, 195, 70);
          ctx.stroke();
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(55, 130);
          ctx.bezierCurveTo(40, 110, 30, 95, 25, 70);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(170, 100);
          ctx.bezierCurveTo(190, 85, 210, 75, 225, 60);
          ctx.stroke();

          // Snowflakes - six-pointed star patterns
          const snowflake = (sx, sy, size) => {
            ctx.save();
            ctx.translate(sx, sy);
            ctx.strokeStyle = 'rgba(160, 190, 220, 0.7)';
            ctx.lineWidth = 1.2;
            ctx.lineCap = 'round';
            for (let i = 0; i < 6; i++) {
              const a = (i / 6) * Math.PI * 2;
              ctx.beginPath();
              ctx.moveTo(0, 0);
              ctx.lineTo(Math.cos(a) * size, Math.sin(a) * size);
              ctx.stroke();
              // Small branches on each arm
              const bx = Math.cos(a) * size * 0.6;
              const by = Math.sin(a) * size * 0.6;
              const pa = a + Math.PI / 4;
              const pb = a - Math.PI / 4;
              ctx.beginPath();
              ctx.moveTo(bx, by);
              ctx.lineTo(bx + Math.cos(pa) * size * 0.3, by + Math.sin(pa) * size * 0.3);
              ctx.stroke();
              ctx.beginPath();
              ctx.moveTo(bx, by);
              ctx.lineTo(bx + Math.cos(pb) * size * 0.3, by + Math.sin(pb) * size * 0.3);
              ctx.stroke();
            }
            // Center dot
            ctx.beginPath();
            ctx.arc(0, 0, 1.5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(200, 220, 240, 0.6)';
            ctx.fill();
            ctx.restore();
          };
          snowflake(55, 70, 12);
          snowflake(180, 55, 10);
          snowflake(140, 170, 14);
          snowflake(35, 180, 9);
          snowflake(210, 160, 11);
          snowflake(90, 250, 10);
          snowflake(195, 240, 8);
          snowflake(128, 100, 7);

          // Snow on ground
          ctx.fillStyle = 'rgba(220, 230, 240, 0.3)';
          ctx.beginPath();
          ctx.moveTo(0, 290);
          ctx.bezierCurveTo(60, 278, 196, 278, 256, 290);
          ctx.lineTo(256, 320);
          ctx.lineTo(0, 320);
          ctx.closePath();
          ctx.fill();
        }
        ctx.restore();

        // Season number in top-left corner
        ctx.save();
        ctx.font = 'bold 28px serif';
        ctx.fillStyle = '#5a6a3a';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText(String(seasonNum), 14, 12);
        ctx.restore();

        // Chinese name at bottom
        ctx.save();
        ctx.font = '26px "Ma Shan Zheng", serif';
        ctx.fillStyle = '#5a6a3a';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(seasonChar, 128, 340);
        ctx.restore();

      } else {
        // Generic fallback for bonus tiles etc.
        ctx.fillStyle = label.color;
        ctx.font = 'bold 140px "Ma Shan Zheng", serif';
        ctx.fillText(label.top, 128, 180);
      }
    }

    const texture = new THREE.CanvasTexture(canvas);
    texture.anisotropy = 8;
    this.tileTextures[key] = texture;
    return texture;
  }

  createTileBackTexture() {
    if (this._backTex) return this._backTex;
    const canvas = document.createElement('canvas');
    canvas.width = 128;
    canvas.height = 176;
    const ctx = canvas.getContext('2d');

    // Back — dark jade green (traditional mahjong tile back)
    const bgG = ctx.createLinearGradient(0, 0, 128, 176);
    bgG.addColorStop(0, '#3a5c4a');
    bgG.addColorStop(0.5, '#2e4f3e');
    bgG.addColorStop(1, '#264434');
    ctx.fillStyle = bgG;
    ctx.fillRect(0, 0, 128, 176);

    // Double border frame — gold-ish
    ctx.strokeStyle = 'rgba(200,180,120,0.35)';
    ctx.lineWidth = 2;
    ctx.strokeRect(6, 6, 116, 164);
    ctx.strokeStyle = 'rgba(200,180,120,0.2)';
    ctx.lineWidth = 1;
    ctx.strokeRect(12, 12, 104, 152);

    // Vermillion seal in center
    ctx.save();
    ctx.translate(64, 88);
    ctx.fillStyle = 'rgba(179,58,42,0.85)';
    ctx.fillRect(-16, -16, 32, 32);
    ctx.strokeStyle = 'rgba(140,30,20,0.6)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(-16, -16, 32, 32);
    // Seal character
    ctx.fillStyle = 'rgba(255,240,220,0.9)';
    ctx.font = 'bold 20px "Ma Shan Zheng", serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('雀', 0, 1);
    ctx.restore();

    this._backTex = new THREE.CanvasTexture(canvas);
    return this._backTex;
  }

  create3DTile(tile, faceDown = false) {
    const W = 0.38, H = 0.52, D = 0.30;
    const group = new THREE.Group();

    // Main tile body
    const bodyGeo = new THREE.BoxGeometry(W, D, H);
    const faceTex = faceDown ? this.createTileBackTexture() : this.createTileTexture(tile);

    // Side/edge materials — darker for face-down tiles to contrast with table
    const sideColor = faceDown ? 0xc8c0b0 : 0xf0e8d8;
    const bottomColor = faceDown ? 0xa8a090 : 0xd8d0c0;
    const frontColor = faceDown ? 0xd0c8b8 : 0xece4d4;
    const sideMat = new THREE.MeshStandardMaterial({ color: sideColor, roughness: 0.55, metalness: 0.02 });
    const bottomMat = new THREE.MeshStandardMaterial({ color: bottomColor, roughness: 0.7, metalness: 0.0 });
    const faceMat = new THREE.MeshStandardMaterial({ map: faceTex, roughness: 0.35, metalness: 0.0 });
    const frontMat = new THREE.MeshStandardMaterial({ color: frontColor, roughness: 0.5, metalness: 0.02 });

    const materials = [
      sideMat,     // right
      sideMat,     // left
      faceMat,     // top (face)
      bottomMat,   // bottom
      frontMat,    // front (visible edge)
      sideMat,     // back
    ];

    const body = new THREE.Mesh(bodyGeo, materials);
    body.castShadow = true;
    body.receiveShadow = true;
    group.add(body);

    // Top edge bevel highlight — subtle white rim
    const bevelGeo = new THREE.BoxGeometry(W - 0.02, 0.005, H - 0.02);
    const bevelMat = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      roughness: 0.3,
      transparent: true,
      opacity: 0.15,
    });
    const bevel = new THREE.Mesh(bevelGeo, bevelMat);
    bevel.position.y = D / 2 + 0.002;
    group.add(bevel);

    group.userData = { tile, faceDown };
    return group;
  }

  clearDiscards() {
    for (const m of this.discardMeshes) {
      this.scene.remove(m);
    }
    this.discardMeshes = [];
  }

  clearTiles() {
    for (const m of this.tileMeshes) {
      this.scene.remove(m);
    }
    this.tileMeshes = [];
  }

  clearWalls() {
    for (const m of this.wallMeshes) {
      this.scene.remove(m);
    }
    this.wallMeshes = [];
  }

  createWalls(wallTiles) {
    this.clearWalls();
    const W = 0.38, H = 0.52, D = 0.28;
    const tilesPerSide = 17;
    const layers = 2;
    let tileIdx = 0;

    // Wall sides: North(z=-4), East(x=4), South(z=4), West(x=-4)
    const sides = [
      { dir: 'north', baseX: 0, baseZ: -4, along: 'x', rot: 0 },
      { dir: 'east',  baseX: 4, baseZ: 0,  along: 'z', rot: Math.PI / 2 },
      { dir: 'south', baseX: 0, baseZ: 4,  along: 'x', rot: Math.PI },
      { dir: 'west',  baseX: -4, baseZ: 0, along: 'z', rot: -Math.PI / 2 },
    ];

    for (const side of sides) {
      for (let layer = 0; layer < layers; layer++) {
        for (let i = 0; i < tilesPerSide; i++) {
          if (tileIdx >= wallTiles.length) break;
          const mesh = this.create3DTile(wallTiles[tileIdx], true);
          tileIdx++;

          const offset = (i - tilesPerSide / 2 + 0.5) * (W + 0.02);
          const yPos = 0.02 + D / 2 + layer * (D + 0.01);

          if (side.along === 'x') {
            mesh.position.set(side.baseX + offset, yPos, side.baseZ);
          } else {
            mesh.position.set(side.baseX, yPos, side.baseZ + offset);
          }
          mesh.rotation.y = side.rot;

          // Tilt tiles face-down (rotate around x so top faces away from center)
          mesh.rotation.x = Math.PI;

          mesh.scale.set(0.85, 0.85, 0.85);
          this.scene.add(mesh);
          this.wallMeshes.push(mesh);
        }
      }
    }
  }

  // Render 3D discards in center of table — per player, surrounding wind indicators
  renderDiscards(allDiscards) {
    this.clearDiscards();

    // Player discard zones: each player's discards go on their side
    // Player 0=East, 1=South(you), 2=West, 3=North
    const zones = [
      { baseX: 1.4, baseZ: 0, cols: 6, along: 'z', rotY: 0 },      // East discards
      { baseX: 0, baseZ: 1.4, cols: 6, along: 'x', rotY: 0 },      // South discards
      { baseX: -1.4, baseZ: 0, cols: 6, along: 'z', rotY: 0 },     // West discards
      { baseX: 0, baseZ: -1.4, cols: 6, along: 'x', rotY: 0 },     // North discards
    ];

    for (let p = 0; p < 4; p++) {
      const discards = allDiscards[p] || [];
      const zone = zones[p];
      const spacing = 0.42;
      const rowSpacing = 0.56;

      for (let i = 0; i < discards.length; i++) {
        const col = i % zone.cols;
        const row = Math.floor(i / zone.cols);
        const offset = (col - zone.cols / 2 + 0.5) * spacing;
        const rowOff = row * rowSpacing;

        const mesh = this.create3DTile(discards[i], false);
        let x, z;
        if (zone.along === 'x') {
          x = zone.baseX + offset;
          z = zone.baseZ > 0 ? zone.baseZ + rowOff : zone.baseZ - rowOff;
        } else {
          x = zone.baseX > 0 ? zone.baseX + rowOff : zone.baseX - rowOff;
          z = zone.baseZ + offset;
        }
        mesh.position.set(x, 0.15, z);
        mesh.rotation.y = (Math.random() - 0.5) * 0.04;
        mesh.scale.set(0.7, 0.7, 0.7);
        this.scene.add(mesh);
        this.discardMeshes.push(mesh);
      }
    }
  }

  // Render opponent tiles as face-down 3D tiles
  renderOpponentTiles(playerIndex, tileCount) {
    // Face-down tile rows on each side of the table (inside the walls)
    // Tiles stand upright with backs facing the camera/center
    const positions = {
      0: { x: 3.0, z: 0, along: 'z', rotY: -Math.PI / 2 },    // East
      2: { x: -3.0, z: 0, along: 'z', rotY: Math.PI / 2 },     // West
      3: { x: 0, z: -2.8, along: 'x', rotY: Math.PI },          // North
    };

    const pos = positions[playerIndex];
    if (!pos) return;

    const spacing = 0.40;
    const count = Math.min(tileCount, 14);

    for (let i = 0; i < count; i++) {
      const mesh = this.create3DTile({}, true);
      const offset = (i - count / 2 + 0.5) * spacing;

      if (pos.along === 'x') {
        mesh.position.set(pos.x + offset, 0.15, pos.z);
      } else {
        mesh.position.set(pos.x, 0.15, pos.z + offset);
      }
      mesh.rotation.y = pos.rotY;

      mesh.scale.set(0.85, 0.85, 0.85);
      this.scene.add(mesh);
      this.tileMeshes.push(mesh);
    }
  }

  onResize() {
    this.camera.aspect = window.innerWidth / window.innerHeight;
    this.camera.updateProjectionMatrix();
    this.renderer.setSize(window.innerWidth, window.innerHeight);
  }

  animate() {
    requestAnimationFrame(() => this.animate());
    this.renderer.render(this.scene, this.camera);
  }
}

// ==================== GAME CONTROLLER ====================
class GameController {
  constructor() {
    this.gs = new GameState();
    this.renderer = new Renderer();
    this.discardSorted = false;

    this.bindEvents();
  }

  bindEvents() {
    document.getElementById('modal-btn').addEventListener('click', () => this.startGame());
    document.getElementById('btn-skip').addEventListener('click', () => this.skipClaim());
    document.getElementById('btn-chi').addEventListener('click', () => this.showChiOptions());
    document.getElementById('btn-pong').addEventListener('click', () => this.claimPong());
    document.getElementById('btn-kong').addEventListener('click', () => this.showKongOptions());
    document.getElementById('btn-mahjong').addEventListener('click', () => this.claimMahjong());
    document.getElementById('btn-discard').addEventListener('click', () => this.discardSelected());
    document.getElementById('btn-discards').addEventListener('click', () => this.toggleDiscardOverlay());
    document.getElementById('btn-sort-hand').addEventListener('click', () => this.sortPlayerHand());
    document.getElementById('discard-close-btn').addEventListener('click', () => this.closeDiscardOverlay());
    document.getElementById('discard-sort-btn').addEventListener('click', () => this.toggleDiscardSort());
  }

  startGame() {
    this.hideModal();
    this.gs.reset();
    this.gs.phase = 'waiting';
    this.gs.currentPlayer = this.gs.dealerSeat;
    this.gs.dealTiles();
    this.renderAll();

    setTimeout(() => {
      if (this.gs.players[this.gs.currentPlayer].isAI) {
        this.gs.phase = 'discard';
        setTimeout(() => this.aiTurn(), 800);
      } else {
        this.gs.phase = 'discard';
        this.gs.drawnTile = this.gs.players[1].hand[this.gs.players[1].hand.length - 1];
        this.renderAll();
      }
    }, 500);
  }

  // ========== RENDERING ==========
  renderAll() {
    this.renderPlayerHand();
    this.render3DScene();
    this.renderMelds();
    this.updatePlayerBubbles();
    this.updateWallInfo();
    this.updateTurnIndicator();
    this.updateActionButtons();
  }

  render3DScene() {
    this.renderer.clearTiles();
    this.renderer.clearDiscards();

    // Render wall tiles (stacked around the playing area)
    this.renderer.createWalls(this.gs.wall);

    // Render discards in center
    const allDiscards = this.gs.players.map(p => p.discards);
    this.renderer.renderDiscards(allDiscards);

    // Render opponent face-down tiles
    for (let i = 0; i < 4; i++) {
      if (i === 1) continue; // skip human
      this.renderer.renderOpponentTiles(i, this.gs.players[i].hand.length);
    }
  }

  renderPlayerHand() {
    const tray = document.getElementById('hand-tray');
    tray.innerHTML = '';
    const hand = this.gs.players[1].hand;

    hand.forEach((tile, index) => {
      const el = document.createElement('div');
      el.className = 'tile';
      if (index === this.gs.selectedTileIndex) el.classList.add('selected');
      if (this.gs.drawnTile && tile.id === this.gs.drawnTile.id) el.classList.add('drawn');

      const label = getTileLabel(tile);
      const body = document.createElement('div');
      body.className = 'tile-body';

      const face = document.createElement('div');
      face.className = 'face';

      if (label.bottom) {
        face.innerHTML = `<div class="tile-content">
          <span class="char-top" style="color:${label.color}">${label.top}</span>
          <span class="char-bottom" style="color:${label.color}">${label.bottom}</span>
        </div>`;
      } else {
        face.innerHTML = `<div class="tile-content">
          <span style="font-size:36px;font-family:'Ma Shan Zheng',serif;color:${label.color}">${label.top}</span>
        </div>`;
      }

      body.appendChild(face);
      el.appendChild(body);
      el.addEventListener('click', () => this.selectTile(index));
      tray.appendChild(el);
    });
  }

  renderMelds() {
    const seatPositions = { 1: 'south', 3: 'north', 2: 'west', 0: 'east' };

    for (let pi = 0; pi < 4; pi++) {
      const seat = seatPositions[pi];
      const container = document.getElementById(`melds-${seat}`);
      if (!container) continue;
      container.innerHTML = '';

      const player = this.gs.players[pi];
      for (const meld of player.melds) {
        const group = document.createElement('div');
        group.className = 'meld-group' + (meld.concealed ? ' concealed' : '');

        for (let i = 0; i < meld.tiles.length; i++) {
          const mt = document.createElement('div');
          mt.className = 'meld-tile';
          if (meld.concealed && (i === 0 || i === 3)) {
            mt.classList.add('facedown');
          } else {
            const label = getTileLabel(meld.tiles[i]);
            mt.style.fontSize = '10px';
            mt.style.color = label.color;
            mt.style.fontFamily = "'Ma Shan Zheng', serif";
            mt.textContent = label.top;
          }
          group.appendChild(mt);
        }
        container.appendChild(group);
      }

      // Show flowers
      for (const flower of player.flowers) {
        const group = document.createElement('div');
        group.className = 'meld-group';
        const ft = document.createElement('div');
        ft.className = 'meld-tile';
        const label = getTileLabel(flower);
        ft.style.fontSize = '10px';
        ft.style.color = label.color;
        ft.style.fontFamily = "'Ma Shan Zheng', serif";
        ft.textContent = label.top;
        group.appendChild(ft);
        container.appendChild(group);
      }
    }
  }

  updatePlayerBubbles() {
    const seatIds = { 0: 'east', 1: 'south', 2: 'west', 3: 'north' };
    for (let i = 0; i < 4; i++) {
      const seat = seatIds[i];
      const bubble = document.getElementById(`p-${seat}`);
      if (!bubble) continue;

      const isActive = (i === this.gs.currentPlayer);
      bubble.classList.toggle('active', isActive);

      const scoreEl = document.getElementById(`score-${seat}`);
      if (scoreEl) scoreEl.textContent = this.gs.players[i].score.toLocaleString();

      // Opponent hand counts
      if (i !== 1) {
        const countEl = document.getElementById(`count-${seat}`);
        if (countEl) countEl.textContent = `${this.gs.players[i].hand.length} tiles`;
      }
    }

    document.getElementById('player-score-display').textContent = this.gs.players[1].score.toLocaleString();
  }

  updateWallInfo() {
    document.getElementById('tiles-left').textContent = this.gs.wall.length;
    document.getElementById('dealer-wind').textContent = WIND_CHARS[WINDS[this.gs.dealerSeat]];
    const wind = this.gs.roundWind ? this.gs.roundWind.toUpperCase() : 'EAST';
    const subtitle = document.getElementById('header-subtitle');
    if (subtitle) {
      subtitle.textContent = `ROUND: 1/4 | ${wind} WINDS | TILES LEFT: ${this.gs.wall.length}`;
    }
  }

  updateTurnIndicator() {
    const el = document.getElementById('turn-indicator');
    const isYourTurn = this.gs.currentPlayer === 1;
    const name = PLAYER_NAMES[this.gs.currentPlayer];
    el.textContent = isYourTurn ? 'Your Turn' : `${name}'s Turn`;
    el.classList.toggle('your-turn', isYourTurn);
  }

  updateActionButtons() {
    const btns = {
      skip: document.getElementById('btn-skip'),
      chi: document.getElementById('btn-chi'),
      pong: document.getElementById('btn-pong'),
      kong: document.getElementById('btn-kong'),
      mahjong: document.getElementById('btn-mahjong'),
      discard: document.getElementById('btn-discard'),
    };

    // Hide all first
    for (const b of Object.values(btns)) b.classList.remove('visible');

    const gs = this.gs;

    // Claiming phase
    if (gs.phase === 'claiming' && gs.claimWindow) {
      const humanClaim = gs.possibleClaims.find(c => c.player === 1);
      if (humanClaim) {
        btns.skip.classList.add('visible');
        if (humanClaim.claims.includes('chi')) btns.chi.classList.add('visible');
        if (humanClaim.claims.includes('pong')) btns.pong.classList.add('visible');
        if (humanClaim.claims.includes('kong')) btns.kong.classList.add('visible');
        if (humanClaim.claims.includes('mahjong')) btns.mahjong.classList.add('visible');
      }
      return;
    }

    // Discard phase - human's turn
    if (gs.phase === 'discard' && gs.currentPlayer === 1) {
      if (gs.selectedTileIndex >= 0) {
        btns.discard.classList.add('visible');
      }

      // Check for self-kong or tsumo
      if (this.gs.canMahjong(1)) btns.mahjong.classList.add('visible');

      const concealedKongs = gs.getConcealedKongs(1);
      const addKongs = gs.getAddKongs(1);
      if (concealedKongs.length > 0 || addKongs.length > 0) {
        btns.kong.classList.add('visible');
      }
    }
  }

  // ========== PLAYER ACTIONS ==========
  selectTile(index) {
    if (this.gs.currentPlayer !== 1 || this.gs.phase !== 'discard') return;
    if (this.gs.selectedTileIndex === index) {
      this.discardSelected();
    } else {
      this.gs.selectedTileIndex = index;
      this.renderPlayerHand();
      this.updateActionButtons();
    }
  }

  discardSelected() {
    if (this.gs.selectedTileIndex < 0) return;
    this.discardTile(1, this.gs.selectedTileIndex);
  }

  sortPlayerHand() {
    this.gs.sortHand(this.gs.players[1].hand);
    this.gs.selectedTileIndex = -1;
    this.renderPlayerHand();
    this.showToast('Hand sorted');
  }

  discardTile(pi, tileIndex) {
    const player = this.gs.players[pi];
    const tile = player.hand.splice(tileIndex, 1)[0];
    player.discards.push(tile);
    this.gs.lastDiscard = tile;
    this.gs.lastDiscardPlayer = pi;
    this.gs.drawnTile = null;
    this.gs.selectedTileIndex = -1;
    this.gs.sortHand(player.hand);
    this.renderAll();
    this.checkForClaims();
  }

  drawPhase(pi) {
    if (this.gs.wall.length === 0) {
      this.endGame('draw');
      return;
    }
    const tile = this.gs.drawTileToHand(pi);
    this.gs.drawnTile = tile;
    if (this.gs.handleFlowers(pi)) {
      this.gs.drawnTile = this.gs.players[pi].hand[this.gs.players[pi].hand.length - 1];
    }
    this.gs.phase = 'discard';
    this.gs.justClaimed = false;
    this.renderAll();
  }

  nextTurn() {
    this.gs.currentPlayer = (this.gs.currentPlayer + 1) % 4;
    this.gs.phase = 'draw';
    this.gs.claimWindow = false;
    this.gs.possibleClaims = [];
    this.gs.justClaimed = false;
    this.clearClaimTimer();
    this.hideClaimPanel();
    this.renderAll();

    if (this.gs.players[this.gs.currentPlayer].isAI) {
      setTimeout(() => {
        this.drawPhase(this.gs.currentPlayer);
        setTimeout(() => this.aiTurn(), 700);
      }, 400);
    } else {
      setTimeout(() => this.drawPhase(this.gs.currentPlayer), 300);
    }
  }

  // ========== CLAIMING ==========
  checkForClaims() {
    this.gs.possibleClaims = [];
    const tile = this.gs.lastDiscard;

    for (let i = 0; i < 4; i++) {
      if (i === this.gs.lastDiscardPlayer) continue;
      const claims = [];
      if (this.gs.canMahjong(i, tile)) claims.push('mahjong');
      if (this.gs.canKong(i, tile)) claims.push('kong');
      if (this.gs.canPong(i, tile)) claims.push('pong');
      if (this.gs.canChi(i, tile)) claims.push('chi');
      if (claims.length > 0) this.gs.possibleClaims.push({ player: i, claims });
    }

    if (this.gs.possibleClaims.length > 0) {
      this.gs.phase = 'claiming';
      this.gs.claimWindow = true;

      const humanClaim = this.gs.possibleClaims.find(c => c.player === 1);
      if (humanClaim) {
        this.updateActionButtons();
        this.startClaimTimer(() => this.skipClaim());
        return;
      }
      setTimeout(() => this.processAIClaims(), 700);
    } else {
      this.nextTurn();
    }
  }

  startClaimTimer(onTimeout) {
    this.clearClaimTimer();
    this.gs.claimTimeRemaining = 10;
    this.gs.claimTimeoutId = setInterval(() => {
      this.gs.claimTimeRemaining--;
      if (this.gs.claimTimeRemaining <= 0) {
        this.clearClaimTimer();
        onTimeout();
      }
    }, 1000);
  }

  clearClaimTimer() {
    if (this.gs.claimTimeoutId) {
      clearInterval(this.gs.claimTimeoutId);
      this.gs.claimTimeoutId = null;
    }
  }

  skipClaim() {
    this.clearClaimTimer();
    this.hideClaimPanel();
    this.gs.claimWindow = false;
    this.updateActionButtons();
    setTimeout(() => this.processAIClaims(), 300);
  }

  processAIClaims() {
    if (!this.gs.claimWindow) return;
    const tile = this.gs.lastDiscard;

    // Priority: mahjong > kong > pong > chi
    for (const claim of this.gs.possibleClaims) {
      if (claim.player === 1) continue;
      if (claim.claims.includes('mahjong')) {
        this.aiClaimMahjong(claim.player);
        return;
      }
    }
    for (const claim of this.gs.possibleClaims) {
      if (claim.player === 1) continue;
      if (claim.claims.includes('kong')) {
        this.aiClaimKong(claim.player, tile);
        return;
      }
    }
    for (const claim of this.gs.possibleClaims) {
      if (claim.player === 1) continue;
      if (claim.claims.includes('pong') && Math.random() > 0.3) {
        this.aiClaimPong(claim.player, tile);
        return;
      }
    }
    for (const claim of this.gs.possibleClaims) {
      if (claim.player === 1) continue;
      if (claim.claims.includes('chi') && Math.random() > 0.5) {
        const combos = this.gs.getChiCombinations(claim.player, tile);
        if (combos.length > 0) {
          this.aiClaimChi(claim.player, tile, combos[0]);
          return;
        }
      }
    }

    this.gs.claimWindow = false;
    this.nextTurn();
  }

  aiClaimPong(pi, tile) {
    const player = this.gs.players[pi];
    const pongTiles = [tile];
    for (let i = 0; i < 2; i++) {
      const idx = player.hand.findIndex(t => this.gs.tilesMatch(t, tile));
      if (idx >= 0) pongTiles.push(player.hand.splice(idx, 1)[0]);
    }
    this.gs.players[this.gs.lastDiscardPlayer].discards.pop();
    player.melds.push({ type: 'pong', tiles: pongTiles, exposed: true });
    this.gs.sortHand(player.hand);
    this.gs.claimWindow = false;
    this.gs.currentPlayer = pi;
    this.gs.phase = 'discard';
    this.gs.lastDiscard = null;
    this.gs.justClaimed = true;
    this.showAIToast(`${PLAYER_EMOJIS[pi]} ${PLAYER_NAMES[pi]} — Pong!`);
    this.renderAll();
    setTimeout(() => this.aiTurn(), 800);
  }

  aiClaimChi(pi, tile, combo) {
    const player = this.gs.players[pi];
    const chiTiles = [tile];
    for (const t of combo.tiles) {
      if (t.id !== tile.id) {
        const idx = player.hand.findIndex(h => h.id === t.id);
        if (idx >= 0) chiTiles.push(player.hand.splice(idx, 1)[0]);
      }
    }
    this.gs.players[this.gs.lastDiscardPlayer].discards.pop();
    chiTiles.sort((a, b) => (a.num || 0) - (b.num || 0));
    player.melds.push({ type: 'chi', tiles: chiTiles, exposed: true });
    this.gs.sortHand(player.hand);
    this.gs.claimWindow = false;
    this.gs.currentPlayer = pi;
    this.gs.phase = 'discard';
    this.gs.lastDiscard = null;
    this.gs.justClaimed = true;
    this.showAIToast(`${PLAYER_EMOJIS[pi]} ${PLAYER_NAMES[pi]} — Chi!`);
    this.renderAll();
    setTimeout(() => this.aiTurn(), 800);
  }

  aiClaimKong(pi, tile) {
    const player = this.gs.players[pi];
    const kongTiles = [tile];
    for (let i = 0; i < 3; i++) {
      const idx = player.hand.findIndex(t => this.gs.tilesMatch(t, tile));
      if (idx >= 0) kongTiles.push(player.hand.splice(idx, 1)[0]);
    }
    this.gs.players[this.gs.lastDiscardPlayer].discards.pop();
    player.melds.push({ type: 'kong', tiles: kongTiles, exposed: true });
    this.gs.sortHand(player.hand);
    this.gs.claimWindow = false;
    this.gs.currentPlayer = pi;

    const replacement = this.gs.drawReplacementTile(pi);
    if (replacement) {
      this.gs.drawnTile = replacement;
      this.gs.handleFlowers(pi);
      this.gs.sortHand(player.hand);
    }
    this.gs.phase = 'discard';
    this.gs.lastDiscard = null;
    this.showAIToast(`${PLAYER_EMOJIS[pi]} ${PLAYER_NAMES[pi]} — Kong!`);
    this.renderAll();
    setTimeout(() => this.aiTurn(), 1000);
  }

  aiClaimMahjong(pi) {
    const player = this.gs.players[pi];
    player.hand.push(this.gs.lastDiscard);
    this.gs.players[this.gs.lastDiscardPlayer].discards.pop();
    this.gs.claimWindow = false;
    this.gs.winType = 'ron';
    this.endGame('win', pi);
  }

  // ========== AI TURN ==========
  aiTurn() {
    if (this.gs.phase !== 'discard') return;
    const pi = this.gs.currentPlayer;
    const player = this.gs.players[pi];
    if (!player.isAI) return;

    // Check tsumo
    if (this.gs.canMahjong(pi)) {
      this.gs.winType = 'tsumo';
      this.endGame('win', pi);
      return;
    }

    // Concealed kong
    const cKongs = this.gs.getConcealedKongs(pi);
    if (cKongs.length > 0 && Math.random() > 0.3) {
      this.declareConcealedKong(pi, cKongs[0].tile);
      return;
    }

    // Add kong
    const aKongs = this.gs.getAddKongs(pi);
    if (aKongs.length > 0 && Math.random() > 0.4) {
      this.declareAddKong(pi, aKongs[0]);
      return;
    }

    const discardIdx = this.gs.aiChooseDiscard(pi);
    if (discardIdx >= 0) this.discardTile(pi, discardIdx);
  }

  declareConcealedKong(pi, tile) {
    const player = this.gs.players[pi];
    const kongTiles = [];
    for (let i = 0; i < 4; i++) {
      const idx = player.hand.findIndex(t => this.gs.tilesMatch(t, tile));
      if (idx >= 0) kongTiles.push(player.hand.splice(idx, 1)[0]);
    }
    player.melds.push({ type: 'kong', tiles: kongTiles, exposed: false, concealed: true });
    this.gs.sortHand(player.hand);

    const replacement = this.gs.drawReplacementTile(pi);
    if (replacement) {
      this.gs.drawnTile = replacement;
      this.gs.handleFlowers(pi);
      this.gs.sortHand(player.hand);
    }

    if (player.isAI) {
      this.showAIToast(`${PLAYER_EMOJIS[pi]} ${PLAYER_NAMES[pi]} — Concealed Kong!`);
      this.renderAll();
      setTimeout(() => this.aiTurn(), 1000);
    } else {
      this.showToast('Concealed Kong!');
      this.renderAll();
    }
  }

  declareAddKong(pi, addKong) {
    const player = this.gs.players[pi];
    const { meld, tile } = addKong;

    // Skip rob-the-kong for simplicity in this prototype
    this.completeAddKong(pi, meld, tile);
  }

  completeAddKong(pi, meld, tile) {
    const player = this.gs.players[pi];
    const tileIdx = player.hand.findIndex(t => t.id === tile.id);
    if (tileIdx >= 0) player.hand.splice(tileIdx, 1);

    meld.type = 'kong';
    meld.tiles.push(tile);
    this.gs.sortHand(player.hand);

    const replacement = this.gs.drawReplacementTile(pi);
    if (replacement) {
      this.gs.drawnTile = replacement;
      this.gs.handleFlowers(pi);
      this.gs.sortHand(player.hand);
    }

    if (player.isAI) {
      this.showAIToast(`${PLAYER_EMOJIS[pi]} ${PLAYER_NAMES[pi]} — Kong!`);
      this.renderAll();
      setTimeout(() => this.aiTurn(), 1000);
    } else {
      this.showToast('Kong!');
      this.renderAll();
    }
  }

  // ========== HUMAN CLAIM ACTIONS ==========
  showChiOptions() {
    this.clearClaimTimer();
    const tile = this.gs.lastDiscard;
    const combos = this.gs.getChiCombinations(1, tile);
    if (combos.length === 1) {
      this.executeChi(combos[0]);
      return;
    }
    this.showClaimPanel('Chi — Choose sequence:', combos.map(combo => ({
      label: 'Chi',
      tiles: combo.tiles,
      claimedTile: tile,
      action: () => this.executeChi(combo)
    })));
  }

  executeChi(combo) {
    this.clearClaimTimer();
    this.hideClaimPanel();
    const tile = this.gs.lastDiscard;
    const player = this.gs.players[1];
    const chiTiles = [tile];
    for (const t of combo.tiles) {
      if (t.id !== tile.id) {
        const idx = player.hand.findIndex(h => h.id === t.id);
        if (idx >= 0) chiTiles.push(player.hand.splice(idx, 1)[0]);
      }
    }
    this.gs.players[this.gs.lastDiscardPlayer].discards.pop();
    chiTiles.sort((a, b) => (a.num || 0) - (b.num || 0));
    player.melds.push({ type: 'chi', tiles: chiTiles, exposed: true });
    this.gs.sortHand(player.hand);
    this.gs.claimWindow = false;
    this.gs.currentPlayer = 1;
    this.gs.phase = 'discard';
    this.gs.lastDiscard = null;
    this.gs.justClaimed = true;
    this.showToast('Chi!');
    this.renderAll();
  }

  claimPong() {
    this.clearClaimTimer();
    this.hideClaimPanel();
    const tile = this.gs.lastDiscard;
    const player = this.gs.players[1];
    const pongTiles = [tile];
    for (let i = 0; i < 2; i++) {
      const idx = player.hand.findIndex(t => this.gs.tilesMatch(t, tile));
      if (idx >= 0) pongTiles.push(player.hand.splice(idx, 1)[0]);
    }
    this.gs.players[this.gs.lastDiscardPlayer].discards.pop();
    player.melds.push({ type: 'pong', tiles: pongTiles, exposed: true });
    this.gs.sortHand(player.hand);
    this.gs.claimWindow = false;
    this.gs.currentPlayer = 1;
    this.gs.phase = 'discard';
    this.gs.lastDiscard = null;
    this.gs.justClaimed = true;
    this.showToast('Pong!');
    this.renderAll();
  }

  showKongOptions() {
    this.clearClaimTimer();
    const options = [];

    if (this.gs.lastDiscard && this.gs.canKong(1, this.gs.lastDiscard)) {
      options.push({
        label: 'Kong (Exposed)',
        tiles: [this.gs.lastDiscard],
        action: () => this.executeKong(this.gs.lastDiscard)
      });
    }
    const cKongs = this.gs.getConcealedKongs(1);
    for (const k of cKongs) {
      options.push({
        label: 'Kong (Concealed)',
        tiles: [k.tile],
        action: () => { this.hideClaimPanel(); this.declareConcealedKong(1, k.tile); }
      });
    }
    const aKongs = this.gs.getAddKongs(1);
    for (const a of aKongs) {
      options.push({
        label: 'Kong (Add)',
        tiles: [a.tile],
        action: () => { this.hideClaimPanel(); this.declareAddKong(1, a); }
      });
    }

    if (options.length === 1) {
      options[0].action();
    } else if (options.length > 1) {
      this.showClaimPanel('Kong — Choose type:', options);
    }
  }

  executeKong(tile) {
    this.hideClaimPanel();
    const player = this.gs.players[1];
    const kongTiles = [tile];
    for (let i = 0; i < 3; i++) {
      const idx = player.hand.findIndex(t => this.gs.tilesMatch(t, tile));
      if (idx >= 0) kongTiles.push(player.hand.splice(idx, 1)[0]);
    }
    if (this.gs.lastDiscard) this.gs.players[this.gs.lastDiscardPlayer].discards.pop();
    player.melds.push({ type: 'kong', tiles: kongTiles, exposed: true });
    this.gs.sortHand(player.hand);
    this.gs.claimWindow = false;
    this.gs.currentPlayer = 1;

    const replacement = this.gs.drawReplacementTile(1);
    if (replacement) {
      this.gs.drawnTile = replacement;
      this.gs.handleFlowers(1);
      this.gs.sortHand(player.hand);
    }
    this.gs.phase = 'discard';
    this.gs.lastDiscard = null;
    this.showToast('Kong!');
    this.renderAll();
  }

  claimMahjong() {
    this.clearClaimTimer();
    this.hideClaimPanel();
    const player = this.gs.players[1];

    if (this.gs.lastDiscard && this.gs.claimWindow) {
      player.hand.push(this.gs.lastDiscard);
      this.gs.players[this.gs.lastDiscardPlayer].discards.pop();
      this.gs.winType = 'ron';
    } else {
      this.gs.winType = 'tsumo';
    }
    this.gs.claimWindow = false;
    this.endGame('win', 1);
  }

  // ========== GAME END ==========
  endGame(result, winner = -1) {
    this.gs.phase = 'ended';
    this.clearClaimTimer();
    this.renderAll();

    if (result === 'draw') {
      this.showModal('流局 — Draw', 'No tiles remaining.', 'Play Again');
    } else {
      const name = PLAYER_NAMES[winner];
      const emoji = PLAYER_EMOJIS[winner];
      const winLabel = this.gs.winType === 'tsumo' ? '自摸 Tsumo' : this.gs.winType === 'rob' ? '搶槓 Rob Kong' : '食糊 Ron';

      let content = `<p>${emoji} ${name} wins by ${winLabel}!</p>`;
      content += '<div class="score-table">';
      for (let i = 0; i < 4; i++) {
        const isWinner = i === winner;
        content += `<div class="score-row${isWinner ? ' winner' : ''}">
          <span class="player-name">${PLAYER_EMOJIS[i]} ${PLAYER_NAMES[i]}</span>
          <span class="player-score">${this.gs.players[i].score.toLocaleString()}</span>
        </div>`;
      }
      content += '</div>';

      this.showModal(`${emoji} ${name} Wins!`, '', 'Play Again', content);
    }
  }

  // ========== DISCARD OVERLAY ==========
  toggleDiscardOverlay() {
    const overlay = document.getElementById('discard-overlay');
    overlay.classList.toggle('show');
    if (overlay.classList.contains('show')) {
      this.renderDiscardOverlay();
    }
  }

  closeDiscardOverlay() {
    document.getElementById('discard-overlay').classList.remove('show');
  }

  toggleDiscardSort() {
    this.discardSorted = !this.discardSorted;
    document.getElementById('discard-sort-btn').textContent = this.discardSorted ? 'By Player' : 'Sort by Suit';
    this.renderDiscardOverlay();
  }

  renderDiscardOverlay() {
    const content = document.getElementById('discard-overlay-content');
    content.innerHTML = '';

    if (this.discardSorted) {
      // Sort by suit
      const allDiscards = [];
      for (const p of this.gs.players) {
        for (const t of p.discards) allDiscards.push(t);
      }
      allDiscards.sort((a, b) => this.gs.getTileSortKey(a) - this.gs.getTileSortKey(b));

      const groups = { bamboo: [], dots: [], characters: [], winds: [], dragons: [], flowers: [] };
      for (const t of allDiscards) {
        const suit = t.suit || 'flowers';
        if (groups[suit]) groups[suit].push(t);
      }

      const suitNames = { bamboo: '竹 Bamboo', dots: '筒 Dots', characters: '萬 Characters', winds: '風 Winds', dragons: '箭 Dragons', flowers: '花 Flowers' };
      for (const [suit, tiles] of Object.entries(groups)) {
        if (tiles.length === 0) continue;
        const section = document.createElement('div');
        section.className = 'discard-section';
        section.innerHTML = `<div class="discard-section-title">${suitNames[suit]}</div>`;
        const grid = document.createElement('div');
        grid.className = 'discard-grid';
        for (const t of tiles) {
          const dt = document.createElement('div');
          dt.className = 'dtile';
          const label = getTileLabel(t);
          dt.style.color = label.color;
          dt.style.fontFamily = "'Ma Shan Zheng', serif";
          dt.innerHTML = label.bottom ? `<div style="font-size:13px;line-height:1">${label.top}<br><span style="font-size:11px">${label.bottom}</span></div>` : label.top;
          grid.appendChild(dt);
        }
        section.appendChild(grid);
        content.appendChild(section);
      }
    } else {
      // By player
      for (let i = 0; i < 4; i++) {
        const discards = this.gs.players[i].discards;
        if (discards.length === 0) continue;
        const section = document.createElement('div');
        section.className = 'discard-section';
        section.innerHTML = `<div class="discard-section-title">${PLAYER_EMOJIS[i]} ${PLAYER_NAMES[i]}</div>`;
        const grid = document.createElement('div');
        grid.className = 'discard-grid';
        for (const t of discards) {
          const dt = document.createElement('div');
          dt.className = 'dtile';
          const label = getTileLabel(t);
          dt.style.color = label.color;
          dt.style.fontFamily = "'Ma Shan Zheng', serif";
          dt.innerHTML = label.bottom ? `<div style="font-size:13px;line-height:1">${label.top}<br><span style="font-size:11px">${label.bottom}</span></div>` : label.top;
          grid.appendChild(dt);
        }
        section.appendChild(grid);
        content.appendChild(section);
      }
    }

    if (content.children.length === 0) {
      content.innerHTML = '<p style="text-align:center;color:#8a7a6a;padding:20px">No discards yet</p>';
    }
  }

  // ========== CLAIM PANEL ==========
  showClaimPanel(title, options) {
    const panel = document.getElementById('claim-panel');
    const titleEl = document.getElementById('claim-panel-title');
    const optionsEl = document.getElementById('claim-options');

    titleEl.textContent = title;
    optionsEl.innerHTML = '';

    for (const opt of options) {
      const el = document.createElement('div');
      el.className = 'claim-option';

      const preview = document.createElement('div');
      preview.className = 'tiles-preview';
      for (const t of opt.tiles) {
        const pt = document.createElement('div');
        pt.className = 'preview-tile';
        if (opt.claimedTile && t.id === opt.claimedTile.id) pt.classList.add('claimed');
        const label = getTileLabel(t);
        pt.style.color = label.color;
        pt.style.fontFamily = "'Ma Shan Zheng', serif";
        pt.textContent = label.top;
        preview.appendChild(pt);
      }

      const labelEl = document.createElement('span');
      labelEl.className = 'action-label';
      labelEl.textContent = opt.label;

      el.appendChild(preview);
      el.appendChild(labelEl);
      el.addEventListener('click', () => opt.action());
      optionsEl.appendChild(el);
    }

    panel.classList.add('visible');
  }

  hideClaimPanel() {
    document.getElementById('claim-panel').classList.remove('visible');
  }

  // ========== UI HELPERS ==========
  showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1500);
  }

  showAIToast(msg) {
    const el = document.getElementById('ai-toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1200);
  }

  showModal(title, text, btnText, extraHTML = '') {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-text').textContent = text;
    document.getElementById('modal-content').innerHTML = extraHTML;
    document.getElementById('modal-btn').textContent = btnText;
    document.getElementById('modal').classList.add('show');
  }

  hideModal() {
    document.getElementById('modal').classList.remove('show');
  }
}

// ==================== INITIALIZE ====================
window.addEventListener('DOMContentLoaded', () => {
  // Wait for fonts to load, then start
  document.fonts.ready.then(() => {
    window.gameController = new GameController();
  });
});
</script>
