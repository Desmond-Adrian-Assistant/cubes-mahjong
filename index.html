<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cubes Mahjong 🀄</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/tiles.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/ui.css">
</head>
<body>

<canvas id="game-canvas"></canvas>

<div class="table-area"></div>

<div id="ui-overlay">
  <div class="top-bar">
    <div class="round-pill">🀄 <span class="wind" id="round-wind">East 1</span></div>
    <button class="menu-btn">⚙</button>
  </div>
  
  <!-- Player bubbles -->
  <div id="p-top" class="player-bubble">
    <div class="bubble-avatar" style="background:linear-gradient(135deg, #b3e5fc 0%, #81d4fa 100%)">🐱</div>
    <div class="bubble-info">
      <span class="name">Mochi</span><span class="wind-seat" id="seat-north">N</span><br>
      <span class="score" id="score-north">25,000</span>
    </div>
  </div>
  <div id="p-left" class="player-bubble">
    <div class="bubble-avatar" style="background:linear-gradient(135deg, #ffe0b2 0%, #ffcc80 100%)">🦊</div>
    <div class="bubble-info">
      <span class="name">Kitsune</span><span class="wind-seat" id="seat-west">W</span><br>
      <span class="score" id="score-west">25,000</span>
    </div>
  </div>
  <div id="p-right" class="player-bubble">
    <div class="bubble-avatar" style="background:linear-gradient(135deg, #e1bee7 0%, #ce93d8 100%)">🐰</div>
    <div class="bubble-info">
      <span class="name">Usagi</span><span class="wind-seat" id="seat-east">E</span><br>
      <span class="score" id="score-east">25,000</span>
    </div>
  </div>
  <div id="p-bottom" class="player-bubble">
    <div class="bubble-avatar" style="background:linear-gradient(135deg, #ffccbc 0%, #ffab91 100%)">🐼</div>
    <div class="bubble-info">
      <span class="name">You</span><span class="wind-seat" id="seat-south">S</span><br>
      <span class="score" id="score-south">25,000</span>
    </div>
  </div>
  
  <!-- Opponent hands -->
  <div id="hand-top" class="opponent-hand"></div>
  <div id="hand-left" class="opponent-hand"></div>
  <div id="hand-right" class="opponent-hand"></div>
  
  <!-- Melds -->
  <div id="melds-south" class="melds-area bottom"></div>
  <div id="melds-north" class="melds-area top"></div>
  <div id="melds-west" class="melds-area left"></div>
  <div id="melds-east" class="melds-area right"></div>
  
  <!-- Wall info -->
  <div class="wall-info">
    <span class="dealer" id="dealer-wind">東</span>
    <span class="tiles-left" id="tiles-left">136</span>
  </div>
  
  <!-- Discard area -->
  <div id="discard-area">
    <div id="discards-display" class="discard-pile"></div>
  </div>
  
  <!-- Turn indicator -->
  <div class="turn-indicator" id="turn-indicator">⭐ Your Turn!</div>
  
  <!-- Player label above hand -->
  <div class="player-label">
    <div class="avatar" style="background:linear-gradient(135deg, #ffccbc 0%, #ffab91 100%)">🐼</div>
    <div class="info">
      <span class="name">You</span>
      <span class="score" id="player-score-display">25,000</span>
    </div>
  </div>
  
  <!-- Player hand -->
  <div class="hand-tray" id="hand-tray"></div>
  
  <!-- Action buttons -->
  <div class="action-bar" id="action-bar">
    <button class="action-btn skip" id="btn-skip">Skip</button>
    <button class="action-btn chi" id="btn-chi">Chow</button>
    <button class="action-btn pong" id="btn-pong">Pung</button>
    <button class="action-btn kong" id="btn-kong">Kong</button>
    <button class="action-btn mahjong" id="btn-mahjong">Hu</button>
    <button class="action-btn discard" id="btn-discard">Discard</button>
  </div>
  
  <!-- Claim options panel -->
  <div class="claim-panel" id="claim-panel">
    <div class="claim-timer" id="claim-timer">10</div>
    <div class="claim-panel-title" id="claim-panel-title">Choose your action</div>
    <div id="claim-options"></div>
  </div>
  
  <!-- Toast -->
  <div class="toast" id="toast"></div>
  <div class="ai-toast" id="ai-toast"></div>
</div>

<!-- Confetti -->
<div class="confetti-container" id="confetti-container"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">🀄 Cubes Mahjong</h2>
    <div id="modal-content"></div>
    <button class="modal-btn" id="modal-btn">Start Game</button>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
